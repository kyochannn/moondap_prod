spring.application.name=moondap

# --- Profile Settings ---
# 로컬 개발 시: dev / 배포 시: prod 로 변경
spring.profiles.active=dev

# --- Server Settings (HTTPS & Proxy) ---
# Cafe24 등 프록시 뒤에서 HTTPS 정보를 정확히 인식하기 위한 설정
server.forward-headers-strategy=framework

# --- DataSource Core ---
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 커넥션 풀 설정 (운영 안정화)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=2000
spring.datasource.hikari.pool-name=MoondapHikariPool

# Mybatis 설정
mybatis.config-location=classpath:mybatis-config.xml
mybatis.mapper-locations=classpath:com/moondap/mybatis/mapper/*.xml

# 관리자 가입 보안 키
admin.secret-key=MOONDAP_ADMIN_2026

# 업로드 용량 제한
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-parameter-count=2000
server.tomcat.max-multipart-form-data-part-count=2000

# MVC 에러 처리
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
