<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layout/main_layout}"
      >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트로 만나는 또 다른 나, 문답</title>
</head>

<body layout:fragment="content">
  <main class="main">
	    <section id="error-404" class="error-404 section">
	      <div class="container" data-aos="fade-up" data-aos-delay="100">
	        <div class="row justify-content-center">
	          <div class="col-lg-8 text-center">
	            <div class="error-number" data-aos="zoom-in" data-aos-delay="200">401</div>
	            <h1 class="error-title" data-aos="fade-up" data-aos-delay="300">로그인이 필요한 서비스입니다.</h1>
	            <p class="error-description" data-aos="fade-up" data-aos-delay="400">
				  세션이 만료되었거나 로그인을 하지 않았어요. <br>
				  계속 이용하시려면 다시 로그인해 주세요.
	            </p>
	            <div class="error-actions" data-aos="fade-up" data-aos-delay="500">
	              <a href="/" class="btn-secondary">
	                <i class="bi bi-house"></i> 메인으로 바로가기
	              </a>
	            </div>
	          </div>
	        </div>
		  </div>
	    </section>

	    <!-- New Test Notification Fragment -->
	    <th:block th:replace="~{fragment/notification :: notification}"></th:block>
	</main>
</body>
</html>
