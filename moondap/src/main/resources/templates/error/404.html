<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main_layout}">
<head>
    <title>페이지를 찾을 수 없습니다 | 문답</title>
    <style>
        .error-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(82, 77, 211, 0.1) 0%, transparent 70%);
        }

        .error-content {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, #524dd3, #ff4d94);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -5px;
            animation: floating 3s ease-in-out infinite;
        }

        .error-message {
            font-size: 1.5rem;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .error-description {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            line-height: 1.6;
            word-break: keep-all;
        }

        .identity-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .identity-text {
            font-style: italic;
            color: #524dd3;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn-home {
            background: linear-gradient(135deg, #524dd3, #7c4dff);
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(82, 77, 211, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(82, 77, 211, 0.4);
            color: white;
        }
    </style>
</head>
<body layout:fragment="content">
    <main class="main">
        <section class="error-section">
            <div class="container error-content" data-aos="fade-up">
                <div class="error-code">404</div>
                <h1 class="error-message mb-4">테스트로 만나는 또 다른 나, <span style="color: #524dd3;">문답</span> <img src="/assets/img/logo.webp" alt="문답 로고" style="height: 32px; margin-left: 8px; vertical-align: middle; margin-top: -4px;"></h1>
                <div class="identity-box">
                    <span class="identity-text">원하시는 페이지를 찾지 못했지만, 더 재미있는 것들이 많아요!</span>
                    <p class="text-white mb-0" style="font-size: 1.1rem; opacity: 0.9; line-height: 1.7;">
                        지금 문답에서 <strong>나의 진짜 성향</strong>을 확인하고 <br>
                        친구들과 결과를 공유해 보시는 건 어떨까요?
                    </p>
                </div>

                <a href="/test/list" class="btn btn-home">
                    <i class="bi bi-rocket-takeoff me-2"></i> 인기 테스트 보러가기
                </a>
            </div>
        </section>
        
        <!-- New Test Notification Fragment -->
        <th:block th:replace="~{fragment/notification :: notification}"></th:block>
    </main>
</body>
</html>
