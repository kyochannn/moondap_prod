<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <title>에겐/테토 테스트 - 성별 선택</title>
    <link th:href="@{/assets/css/question-page.css}" rel="stylesheet">
    <link th:href="@{/assets/css/admin-form.css}" rel="stylesheet">
    <link th:href="@{/assets/css/selection-card.css}" rel="stylesheet">
</head>

<body layout:fragment="content">
    <main class="main">
        <section class="section py-5">
            <div class="container selection-container" data-aos="fade-up">
                
                <div class="section-title text-center mb-5">
                    <h2 class="text-white fw-bold mb-3">성별 선택</h2>
                    <p class="text-white-50 fs-5">정확한 분석을 위해 당신의 성별을 선택해 주세요.</p>
                    <div class="mx-auto" style="width: 50px; height: 4px; background: #7d77ff; border-radius: 2px;"></div>
                </div>

                <div class="row justify-content-center g-4">
                    <!-- 남성 선택 카드 -->
                    <div class="col-6 col-md-5">
                        <div class="selection-card theme-blue" onclick="selectGender('M')">
                            <div class="icon-box">
                                <i class="bi bi-gender-male"></i>
                            </div>
                            <h3>남자 (M)</h3>
                            <p>
                               <span class="fw-bold" style="color: #3876f2;">[[${#numbers.formatInteger(maleCount, 0, 'COMMA')}]]명이 참여했어요.</span>
                            </p>
                        </div>
                    </div>

                    <!-- 여성 선택 카드 -->
                    <div class="col-6 col-md-5">
                        <div class="selection-card theme-pink" onclick="selectGender('W')">
                            <div class="icon-box">
                                <i class="bi bi-gender-female"></i>
                            </div>
                            <h3>여자 (W)</h3>
                            <p>
                               <span class="fw-bold" style="color: #ff4d94;">[[${#numbers.formatInteger(femaleCount, 0, 'COMMA')}]]명이 참여했어요.</span>
                            </p>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <p class="text-white-50 small">
                        * 성별에 따라 분석 기준과 질문 문항이 다르게 구성되어 있어요.
                    </p>
                </div>
            </div>
        </section>

        <!-- 이동을 위한 Hidden Form -->
        <form id="genderForm" th:action="@{/egenTeto/start}" method="get">
            <input type="hidden" id="genderInput" name="gender">
        </form>

        <!-- Hidden Form 및 스크립트는 유지 (로딩 HTML만 삭제) -->
    </main>

    <script>
        function selectGender(gender) {
            document.getElementById('genderInput').value = gender;
            
            // 시각적 피드백 (선택자 수정)
            const card = document.querySelector(`.selection-card.${gender === 'M' ? 'theme-blue' : 'theme-pink'}`);
            if (card) {
                card.classList.add('clicked');
            }
            
            // 로딩 오버레이 표시 (방어 코드 추가)
            if (typeof showLoading === 'function') {
                showLoading(0, '질문지를 생성하고 있습니다', '세상의 모든 테스트, 문답!');
            } else {
                const loadingOverlay = document.getElementById("loadingOverlay");
                if (loadingOverlay) {
                    loadingOverlay.classList.add('active');
                }
            }
            
            // 약간의 지연 후 폼 제출
            setTimeout(() => {
                document.getElementById('genderForm').submit();
            }, 800);
        }

        // 브라우저 뒤로가기 시 로딩 오버레이 숨기기
        window.onpageshow = function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                if (typeof hideLoading === 'function') {
                    hideLoading();
                } else {
                    const loadingOverlay = document.getElementById("loadingOverlay");
                    if (loadingOverlay) {
                        loadingOverlay.classList.remove('active');
                    }
                }
                // 시각적 피드백 초기화 (선택자 수정)
                document.querySelectorAll('.selection-card').forEach(card => {
                    card.classList.remove('clicked');
                });
            }
        };
    </script>
    <!-- 에러 메시지 알림 스크립트 -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        window.onload = function() {
            const errorMessage = /*[[${errorMessage}]]*/ null;
            if (errorMessage) {
                alert(errorMessage);
            }
        };
        /*]]>*/
    </script>
</body>

</html>
