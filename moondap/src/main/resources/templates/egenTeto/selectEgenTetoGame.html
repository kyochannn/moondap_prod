<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에겐/테토 테스트 - 상세 정보</title>
    <!-- Portfolio Details 전용 스타일 (메인 CSS 활용 및 인라인 가미) -->
    <script>
        function startBalanceGame() {
            location.href = '/egenTeto/select';
        }
    </script>
</head>

<body layout:fragment="content">
    <main class="main">

        <!-- Portfolio Details Section -->
        <section id="game-gallery-details" class="game-gallery-details section">

            <div class="container" data-aos="fade-up" data-aos-delay="100">

                <div class="row gy-5">
                    <!-- 왼쪽 미디어 영역 -->
                    <div class="col-lg-4">
                        <div class="game-gallery-details-media">
                            <div class="main-image">
                                <div class="game-gallery-details-slider">
                                    <img src="/assets/img/testList/img3.png" alt="에겐테토 테스트 정보" class="img-fluid">
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- 오른쪽 콘텐츠 영역 -->
                    <div class="col-lg-8">
                        <div class="game-gallery-details-content">
                            <div class="project-meta" data-aos="fade-left">
                                
                                <div class="date-client">
                                    <div class="meta-item">
                                        <i class="bi bi-people-fill"></i>
                                        <span>참여수: [[${#numbers.formatInteger(totalCount, 0, 'COMMA')}]]명</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="bi bi-stopwatch-fill"></i>
                                        <span>약 3분 소요</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="bi bi-check-square-fill"></i>
                                        <span>24문항</span>
                                    </div>
                                </div>
                            </div>

                            <h2 class="project-title fw-bold mb-4">에겐 vs 테토 테스트</h2>

                            <div class="project-overview">
                                <p class="lead mb-4">
                                    최근 커뮤니티에서 화제가 되고 있는 '에겐'과 '테토' 기질 분석 테스트입니다. 
                                    자신의 내면, 스타일, 사회성, 그리고 야망을 통해 당신이 어떤 기질에 더 가까운지 과학적으로 분석해 드립니다.
                                </p>

                                <div class="accordion project-accordion" id="testAccordion">
                                    <div class="accordion-item shadow-sm border-0 rounded overflow-hidden">
                                        <h2 class="accordion-header">
                                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true">
                                                <i class="bi bi-info-circle-fill me-2"></i> 테스트 소개
                                            </button>
                                        </h2>
                                        <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#testAccordion">
                                            <div class="lead accordion-body">
                                                현대 남녀의 라이프스타일과 내면의 가치를 4가지 영역으로 구분하여 측정합니다. 
                                                단순히 MBTI를 넘어선 더 세밀하고 감각적인 분석 결과를 확인해 보세요.
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>

                            <div class="button-group w-100">
                                <button onclick="startBalanceGame()"
                                    class="btn btn-primary w-100 py-2 text-nowrap rounded-5"
                                    style="background: #524dd3; border: none;">
                                    테스트 시작
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </section><!-- /Portfolio Details Section -->

    </main>
</body>

</html>
