<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에겐/테토 테스트 - 상세 정보</title>
    <!-- Portfolio Details 전용 스타일 (메인 CSS 활용 및 인라인 가미) -->
    <style>
        /* 링크 복사 토스트 스타일 (밸런스 게임 스타일 통일) */
        #copyToast {
            visibility: hidden;
            min-width: 200px;
            background-color: #ffffff;
            color: #000000;
            text-align: center;
            border-radius: 10px;
            padding: 12px 24px;
            position: fixed;
            z-index: 10000;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #copyToast.show {
            visibility: visible;
            -webkit-animation: fadein 0.5s, fadeout 0.5s 2.5s;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @-webkit-keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 50px; opacity: 1; } }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 50px; opacity: 1; } }
        @-webkit-keyframes fadeout { from { bottom: 50px; opacity: 1; } to { bottom: 0; opacity: 0; } }
        @keyframes fadeout { from { bottom: 50px; opacity: 1; } to { bottom: 0; opacity: 0; } }
        
        .share-buttons .btn {
            font-size: 0.9rem;
            padding: 8px 16px;
        }
    </style>
</head>

<body layout:fragment="content">
    <!-- 복사 알림 토스트 (밸런스 게임 스타일) -->
    <div id="copyToast"><i class="bi bi-check-circle-fill me-2"></i>링크가 복사되었습니다!</div>

    <main class="main">

        <!-- Portfolio Details Section -->
        <section id="game-gallery-details" class="game-gallery-details section">

            <div class="container" data-aos="fade-up" data-aos-delay="100">

                <div class="row gy-5">
                    <!-- 왼쪽 미디어 영역 -->
                    <div class="col-lg-4 order-2 order-lg-1 d-none d-lg-block">
                        <div class="game-gallery-details-media">
                            <div class="main-image">
                                <div class="game-gallery-details-slider">
                                    <img src="/assets/img/testList/img3.png" alt="에겐테토 테스트 정보" class="img-fluid" style="aspect-ratio: 1 / 1; object-fit: cover; width: 100%; border-radius: 20px;">
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- 오른쪽 콘텐츠 영역 -->
                    <div class="col-lg-8 order-1 order-lg-2">
                        <div class="game-gallery-details-content">
                            <h2 class="project-title fw-bold mb-4 text-center text-lg-start">에겐 vs 테토 테스트</h2>
                            
                            <div class="project-meta text-center text-lg-start" data-aos="fade-left">
                                <div class="date-client d-flex align-items-center justify-content-center justify-content-lg-start gap-3 flex-nowrap">
                                    <div class="meta-item text-nowrap">
                                        <i class="bi bi-people-fill"></i>
                                        <span>참여수: [[${#numbers.formatInteger(totalCount, 0, 'COMMA')}]]명</span>
                                    </div>
                                    <div class="meta-item text-nowrap">
                                        <i class="bi bi-stopwatch-fill"></i>
                                        <span>약 3분 소요</span>
                                    </div>
                                    <div class="meta-item text-nowrap">
                                        <i class="bi bi-check-square-fill"></i>
                                        <span>24문항</span>
                                    </div>
                                </div>
                            </div>

                            <div class="project-overview mb-0">
                                <div class="accordion project-accordion" id="testAccordion">
                                    <div class="accordion-item shadow-sm border-0 rounded overflow-hidden">
                                        <h2 class="accordion-header">
                                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true">
                                                <i class="bi bi-info-circle-fill me-2 mb-0"></i> 테스트 소개
                                            </button>
                                        </h2>
                                        <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#testAccordion">
                                            <div class="accordion-body text-white mt-0">
                                                "나는 감성 충만 '에겐'? 아니면 이성 폭발 '테토'?"<br><br>

                                                요즘 가장 핫한 현대 남녀 성향 구분법!<br>
                                                외적인 스타일부터 내면의 깊은 심리, 숨겨진 야망까지 24개의 문항으로 당신의 진짜 유형을 완벽하게 분석해 드립니다.<br><br>
                                                과연 당신은 상위 몇 %의 에겐/테토일까요? 지금 바로 확인해 보세요! 🎨🔥
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>

                            <div class="button-group mt-3">
                                <div class="d-flex align-items-center gap-2">
                                    <button onclick="shareKakaoAction()" class="btn btn-warning rounded-pill px-3 py-2 fw-bold text-nowrap text-dark shadow-sm" style="background-color: #FEE500; border: none;">
                                        <i class="bi bi-chat-fill"></i> 공유
                                    </button>
                                    <button onclick="copyLinkAction()" class="btn btn-outline-info rounded-pill px-3 py-2 fw-bold text-nowrap shadow-sm">
                                        <i class="bi bi-link-45deg"></i> 복사
                                    </button>
                                    
                                    <button onclick="location.href='/egenTeto/select'"
                                        class="btn btn-primary flex-grow-1 py-2 text-nowrap rounded-5 shadow-sm"
                                        style="background: #524dd3; border: none; font-weight: 600;">
                                        테스트 시작 <i class="bi bi-arrow-right"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </section><!-- /Portfolio Details Section -->

    </main>

    <script th:inline="javascript">
        // 1. 결과 링크 복사 (밸런스 게임 스타일 로직)
        function copyLinkAction() {
            const url = window.location.href;
            
            navigator.clipboard.writeText(url).then(function() {
                const toast = document.getElementById("copyToast");
                toast.className = "show";
                setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
            }).catch(function(err) {
                // 구형 브라우저 대응 (폴백)
                const textArea = document.createElement("textarea");
                textArea.value = url;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                const toast = document.getElementById("copyToast");
                toast.className = "show";
                setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
            });
        }

        // 2. 카카오 공유 (현재는 링크 복사로 대체)
        function shareKakaoAction() {
            alert('카카오톡 공유 기능을 연동하시려면 Kakao JavaScript SDK 키가 필요합니다. 현재는 링크 복사로 대체됩니다.');
            copyLinkAction();
        }
    </script>
</body>

</html>
