<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <title>에겐/테토 테스트 - 질문</title>
    <link th:href="@{/assets/css/question-page.css}" rel="stylesheet">
</head>

<body layout:fragment="content">
    <main class="main">
        <div class="wizard-container" data-aos="fade-up">
            <!-- 프로그레스 바 -->
            <div class="test-progress">
                <div id="progressBar" class="test-progress-bar"></div>
            </div>

            <!-- 질문 노출 영역 -->
            <div id="questionContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3">질문을 불러오고 있습니다...</p>
                </div>
            </div>

            <!-- 하단 네비게이션 (필요 시) -->
            <div class="mt-4 d-flex justify-content-between align-items-center">
                <button id="prevBtn" class="btn btn-outline-light rounded-pill px-4" style="display:none;">
                    <i class="bi bi-arrow-left"></i> 이전
                </button>
                <div id="questionNumber" class="text-secondary fw-bold">1 / 24</div>
            </div>

        </div>

        <!-- 결과 전송을 위한 Hidden Form -->
        <form id="submitForm" th:action="@{/egenTeto/submit}" method="post">
            <input type="hidden" name="gender" th:value="${gender}">
            <input type="hidden" id="answersInput" name="answers">
        </form>

        <!-- 결과 전송을 위한 Hidden Form -->
    </main>

    <!-- JS 로직 -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const gender = /*[[${gender}]]*/ 'M';

        
        // 질문 데이터 세트
        const questionData = {
            'M': [
                "오늘 컨셉은 꾸안꾸? 아니면 힙스터? 😎 매번 색다른 무드로 변신하는 걸 즐기시나요?",
                "멘붕 오는 상황이 닥치면 감정에 빠지기보다 '자, 이제 뭘 해결해야 하지?'라며 해결책부터 찾으시나요? 🛠️",
                "침묵이 흐르는 어색한 모임... 참지 못하고 먼저 대화 주제를 던지며 분위기를 하드캐리하시나요? 🎤",
                "나에게 성공이란 마음의 평화보다는 사회적 인정이나 빵빵한 통장 잔고처럼 눈에 보이는 결과인가요? 💰",
                "쇼핑할 땐 역시 무신사, 탑텐처럼 깔끔하고 실패 없는 대중적인 브랜드가 최고인가요? 👕",
                "친구가 고민을 털어놓을 때 해결책을 주기보다 '진짜 속상했겠다...'라며 친구 마음에 100% 동기화되시나요? 🫂",
                "힘든 일이 있을 때 혼자 해결하기보다 절친에게 다 털어놓고 감정을 나눠야 에너지가 충전되시나요? 🗣️",
                "새로운 도전을 앞두고 '잘 될 거야!'라는 기대보다 '망하면 어떡하지?'라는 불안감을 더 크게 느끼시나요? 😟",
                "한번 목표를 정하면 하늘이 두 쪽 나도 끝까지 밀어붙여서 기어코 결과를 보고야 마는 타입이신가요? 🔥",
                "오늘 코디 찰떡이라는 칭찬 한마디면 하루 종일 입가에 미소가 번지고 자신감이 뿜뿜하시나요? 🚀",
                "나의 실수에 대해 뼈 때리는 비판을 들어도 상처받기보단 '오히려 좋아!'하며 분석해서 배우려 하시나요? 🧐",
                "사람들 사이에서 갈등이 생기면 감정적인 위로보다 논리적인 사실 관계를 따지는 게 더 중요하다고 생각하시나요? ⚖️",
                "번듯한 직장이나 고연봉처럼 남들이 말하는 '성공의 기준'을 맞춰야 한다는 부담을 종종 느끼시나요? 📈",
                "처음 본 사람 앞에서도 상대방의 분위기를 살피며 먼저 편안하게 다가가기 위해 노력하는 편이신가요? 😊",
                "유행 타는 힙한 코디보다는 언제 입어도 실패 없는 베이직하고 깔끔한 스타일을 선호하시나요? ✨",
                "친구에게 서운함이 생기면 화를 내기보다 왜 서운했는지 구체적인 상황과 이유를 조근조근 설명하시나요? 💬",
                "슬픈 영화를 보거나 감동적인 음악을 들으면 나도 모르게 눈물이 핑 돌 만큼 감정적으로 크게 동요하시나요? 😭",
                "후회되는 일이나 과거의 미련은 금방 털어버리고 '어쩌겠어, 현생 살아야지!' 하며 현실에 집중하는 편인가요? 🏃‍♂️",
                "남들은 잘 모르는 나만 알고 싶은 브랜드나 독특한 스타일을 찾아내는 걸 즐기시나요? 🕵️‍♂️",
                "다른 사람의 안타까운 사연을 보면 마치 내 일처럼 가슴 아파하고 진심으로 속상해하시나요? 💔",
                "게임이든 업무든 경쟁 상황에 놓이면 '무조건 이겨야 직성이 풀린다'는 승부욕이 활활 타오르시나요? 🥇",
                "어려운 문제에 부딪히면 혼자 끙끙 앓기보다 주변에 도움을 요청해서 함께 해결하는 걸 선호하시나요? 🤝",
                "옷 쇼핑은 너무 귀찮아! 누가 내 취향대로 싹 다 골라줬으면 좋겠다고 생각하시나요? 🛒",
                "단체 활동을 할 때 모두가 조화롭게 어울리고 편안한 분위기가 유지되는지에 신경을 많이 쓰시나요? 🕊️"
            ],
            'W': [
                "친구나 주변 사람의 착장을 보고 '오, 나도 저런 스타일 한번 도전해볼까?'라는 생각이 자주 드시나요? 👀",
                "누군가에게 서운함이 생기면 구구절절 말하기보다, 조용히 마음의 거리를 두는 편이신가요? 😶",
                "친구들과 만날 때, 동선과 시간을 고려해 가장 효율적인 장소를 딱딱 정하는 '인간 네비게이터'이신가요? 🗺️",
                "인생 계획을 세울 때 나의 커리어나 사회적 지위 같은 '멋진 성공'을 가장 우선순위에 두시나요? 🏆",
                "샤랄라한 스타일보다는 스트릿 감성이 낭낭한 힙한 코디를 더 즐겨 입으시나요? 🤘",
                "상대방과 의견이 다를 때, 혹시나 기분이 상할까 봐 내 의견을 말하기 망설여지거나 어려우신가요? 🙊",
                "기분이 저기압일 땐 혼자 있는 것보다 누군가와 수다를 떨며 위로받아야 기분이 풀리시나요? 🫂",
                "새로운 일을 시작할 때 '대박'보다는 '안전'이 최고! 불확실한 모험은 일단 멈칫하게 되시나요? 🛑",
                "목표 달성을 위해서라면 사람들과의 관계에서 오는 사소한 서운함 정도는 쿨하게 넘기실 수 있나요? 💪",
                "미용실, 네일, 마사지나 명품관 쇼핑처럼 나를 가꾸고 대접받는 시간을 좋아하시나요? ✨",
                "화가 날 때 대놓고 말하기보다 믿을 만한 사람에게 슬쩍 털어놓으며 스트레스를 푸시나요? 🤫",
                "인간관계에서 뜨거운 감정 표현보다 신뢰와 약속 같은 '원칙'을 지키는 게 더 중요하다고 믿으시나요? 🤝",
                "미래를 그릴 때 화려한 성공보다는 사랑하는 사람들과 함께하는 평온하고 행복한 일상이 먼저 떠오르시나요? 🏡",
                "주변 사람의 기류를 금방 읽어내고, 그 분위기에 맞춰 내 텐션을 조절하는 게 익숙하신가요? 🌊",
                "나는 나만의 길이 있다! 유행에 휘둘리지 않고 내가 좋아하는 스타일을 꿋꿋하게 고수하시나요? 🚩",
                "대화할 때 감정적인 공감보다는 내가 관심 있는 분야의 정보나 분석적인 이야기를 나눌 때 더 신나시나요? 📊",
                "주변 사람들의 사소한 말 한마디나 행동에도 내 마음이 쉽게 출렁이고 영향을 받는 편이신가요? 🍃",
                "힘들어하는 사람을 보면 먼저 다가가 따뜻하게 안아주거나 다정한 말을 건네는 편이신가요? 🧡",
                "하늘하늘한 원피스처럼 여성스럽고 러블리한 스타일의 옷을 좋아하시나요? 👗",
                "사람 관계에서 생기는 미묘한 감정 소모나 갈등 때문에 스트레스를 받는 일이 잦으신가요? 🤯",
                "자신의 능력에 대해 '이 정도면 됐지' 하기보다 객관적이고 엄격하게 스스로를 채찍질하는 편이신가요? 🧐",
                "목표를 이루는 결과도 좋지만, 그 과정에서 동료들과 나누는 끈끈한 유대감이 더 소중하신가요? 👨‍👩‍👧‍👦",
                "외모 칭찬을 들어도 크게 들뜨지 않고 '아, 감사합니다~' 하고 덤덤하게 넘기는 편이신가요? 😐",
                "소중한 사람과 잘 지내기 위해서라면 나의 고집이나 편안함을 기꺼이 양보하거나 희생할 수 있나요? 🙏"
            ]
        };

        const options = ["매우 그렇다", "그렇다", "그렇지 않다", "매우 그렇지 않다"];
        const questions = questionData[gender];
        let currentIndex = 0;
        const userAnswers = [];

        const container = document.getElementById("questionContainer");
        const progressBar = document.getElementById("progressBar");
        const qNumberSpan = document.getElementById("questionNumber");
        const prevBtn = document.getElementById("prevBtn");

        function renderQuestion(index) {
            container.innerHTML = `
                <div class="question-item active">
                    <h4 class="question-title">Q${index + 1}. ${questions[index]}</h4>
                    <div class="options-list">
                        ${options.map((opt, i) => `
                            <div class="option-btn" onclick="selectOption(this, ${index}, '${opt}')">
                                <i class="bi bi-circle"></i>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            // UI 상태 업데이트
            const progress = (index / questions.length) * 100;
            progressBar.style.width = `${progress}%`;
            qNumberSpan.innerText = `${index + 1} / ${questions.length}`;
            prevBtn.style.display = 'block'; // 항상 노출
        }

        window.selectOption = function(element, qIdx, val) {
            userAnswers[qIdx] = val;
            
            // 즉각적인 시각적 피드백
            const optionsList = element.closest('.options-list');
            optionsList.classList.add('disabled'); // 중복 클릭 방지
            
            element.classList.add('selected');
            const icon = element.querySelector('i');
            if (icon) {
                icon.classList.remove('bi-circle');
                icon.classList.add('bi-check-circle-fill');
            }

            // 클릭 시 프로그레스 바 채우기
            const nextProgress = ((qIdx + 1) / questions.length) * 100;
            progressBar.style.width = `${nextProgress}%`;
            
            // 다음 질문으로 이동 (약간의 선택 지연 효과)
            setTimeout(() => {
                if (qIdx < questions.length - 1) {
                    currentIndex++;
                    renderQuestion(currentIndex);
                } else {
                    finishTest();
                }
            }, 400);
        };

        function finishTest() {
            // 로딩 오버레이 표시 (전역 함수 사용)
            if (typeof showLoading === 'function') {
                showLoading(0, '결과 분석중입니다.', '당신의 성향 분석 알고리즘이 동작 중입니다...');
            } else {
                document.getElementById("loadingOverlay").classList.add('active');
            }
            document.getElementById("answersInput").value = JSON.stringify(userAnswers);
            
            setTimeout(() => {
                document.getElementById("submitForm").submit();
            }, 1500);
        }

        prevBtn.onclick = () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion(currentIndex);
            } else {
                // 1번 질문에서 이전 클릭 시 성별 선택으로 이동
                if (confirm('성별 선택 화면으로 돌아가시겠습니까?')) {
                    location.href = '/egenTeto/select';
                }
            }
        };


        // 브라우저 뒤로가기 시 로딩 오버레이 숨기기
        window.onpageshow = function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                document.getElementById("loadingOverlay").style.display = 'none';
            }
        };


        // 초기 시작
        renderQuestion(currentIndex);
        /*]]>*/
    </script>
</body>

</html>
