<th:block th:fragment="header" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
  <header id="header" class="header d-flex align-items-center sticky-top">
    <div
      class="header-container container-fluid container-xl position-relative d-flex align-items-center">

      <div class="header-left d-flex align-items-center" style="flex: 1;">
        <a href="/" class="logo d-flex align-items-center me-auto me-xl-0">
          <img style="width: 20px;" src="/assets/img/logo.webp" alt="">
        </a>
      </div>

      <nav id="navmenu" class="navmenu mx-auto">
        <ul>
          <!-- 로그인하지 않은 경우 -->
          <li sec:authorize="isAnonymous()" class="dropdown"><a href="/loginView"><span>로그인</span></a></li>
          <li sec:authorize="isAnonymous()" class="dropdown"><a href="/joinSelectView"><span>회원가입</span></a></li>
          
          <!-- 로그인한 경우: 콘텐츠 만들기 -->
          <li sec:authorize="isAuthenticated()" class="dropdown"><a href="#"><span>콘텐츠 만들기</span> <i class="bi bi-chevron-down toggle-dropdown"></i></a>
            <ul>
              <li><a href="/test/manage/new">테스트 만들기</a></li>
              <li><a href="/balanceGame/insertBalanceGameView">밸런스 게임 만들기</a></li>
            </ul>
          </li>

          <!-- 로그인한 경우: 콘텐츠 관리 -->
          <li sec:authorize="isAuthenticated()" class="dropdown"><a href="#"><span>콘텐츠 관리</span> <i class="bi bi-chevron-down toggle-dropdown"></i></a>
            <ul>
              <li><a href="/test/manage/list">테스트 관리</a></li>
              <li><a href="/balanceGame/manage/list">밸런스 게임 관리</a></li>
              <li sec:authorize="hasRole('ROLE_ADMIN')"><a href="/admin/category/list">카테고리 관리</a></li>
            </ul>
          </li>
          <li sec:authorize="isAuthenticated()" class="dropdown">
            <a href="/mypage">
              <span style="display: inline-flex; align-items: center; gap: 6px;">
                <img th:src="${#authentication.principal.user.profileImage != null and !#authentication.principal.user.profileImage.isEmpty() and !#authentication.principal.user.profileImage.contains('default')} ? @{'/uploads/' + ${#authentication.principal.user.profileImage}} : @{/assets/img/misc/default-avatar.svg}"
                     alt="프로필"
                     style="width: 26px; height: 26px; border-radius: 50%; object-fit: cover; border: 1.5px solid rgba(82,77,211,0.6); flex-shrink: 0;">
                <span><span class="text-primary fw-bold" sec:authentication="name">사용자명</span>님</span>
              </span>
            </a>
          </li>
          <li sec:authorize="isAuthenticated()" class="dropdown"><a href="/logout"><span>로그아웃</span></a></li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>
      <div class="header-right d-flex justify-content-end" style="flex: 1;">
        <a class="btn-getstarted" href="/test/list">모든 테스트 보기</a>
      </div>
    </div>
  </header>
</th:block>
