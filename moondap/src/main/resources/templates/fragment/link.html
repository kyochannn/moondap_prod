<th:block th:fragment="link">

  <link th:href="@{/assets/img/favicon.png}" rel="icon">
  <link th:href="@{/assets/img/favicon.png}" rel="apple-touch-icon">

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link th:href="@{/assets/vendor/bootstrap/css/bootstrap.css}" rel="stylesheet">
  <link th:href="@{/assets/vendor/bootstrap-icons/bootstrap-icons.css}" rel="stylesheet">
  <link th:href="@{/assets/vendor/aos/aos.css}" rel="stylesheet">
  <link th:href="@{/assets/vendor/swiper/swiper-bundle.min.css}" rel="stylesheet">
  <link th:href="@{/assets/vendor/glightbox/css/glightbox.min.css}" rel="stylesheet">

  <link th:href="@{/assets/css/main.css(v=1.1)}" rel="stylesheet">

  <script>
    /**
     * Global Image Error Handler
     * 페이지 상단에서 즉시 실행되어, 모든 이미지 로딩 실패를 감지하고 기본 이미지로 교체합니다.
     * (main.js보다 먼저 실행되어야 모든 이미지를 안정적으로 추적할 수 있습니다.)
     */
    window.addEventListener('error', function(e) {
      if (e.target.tagName === 'IMG') {
        const defaultImg = '/assets/img/default-img/default-content-img.png';
        // 무한 루프 방지: 현재 소스가 기본 이미지가 아닐 때만 실행
        if (e.target.src && e.target.src.indexOf(defaultImg) === -1) {
          e.target.src = defaultImg;
        }
      }
    }, true);
  </script>
</th:block>
