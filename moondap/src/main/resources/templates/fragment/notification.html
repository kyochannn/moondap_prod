<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="notification">
  <!-- New Test Notification Toast -->
  <div id="new-test-toast" class="new-test-toast d-none">
    <div class="toast-content">
      <div class="toast-icon">
        <i class="bi bi-tree-fill"></i>
      </div>
      <div class="toast-text">
        <span class="toast-tag">NEW</span>
        <p>Question Tree가 문답으로 새롭게 리뉴얼 되었어요!</p>
      </div>
      <button type="button" class="btn-close-toast" onclick="closeToast()">
        <i class="bi bi-x"></i>
      </button>
    </div>
  </div>

  <style>
    .new-test-toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 12px 18px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      animation: slideInUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      max-width: 350px;
      width: auto;
    }

    .toast-content {
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
    }

    .toast-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #00b09b, #96c93d);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .toast-text {
      flex-grow: 1;
    }

    .toast-text p {
      margin: 0;
      font-weight: 500;
      font-size: 0.85rem;
      line-height: 1.2;
      word-break: keep-all;
    }

    .toast-tag {
      background: #ff4b2b;
      color: white;
      font-size: 0.65rem;
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: bold;
      margin-bottom: 3px;
      display: inline-block;
    }

    .btn-close-toast {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0;
      transition: color 0.3s;
    }

    .btn-close-toast:hover {
      color: white;
    }

    /* 모바일 대응 (768px 이하) */
    @media (max-width: 768px) {
      .new-test-toast {
        bottom: 20px;
        left: 20px;
        right: 20px;
        max-width: none;
        padding: 10px 15px;
      }
      .toast-text p {
        font-size: 0.8rem;
      }
      .toast-icon {
        width: 32px;
        height: 32px;
        font-size: 1rem;
      }
    }

    @keyframes slideInUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const toast = document.getElementById('new-test-toast');
      if (toast) {
        setTimeout(() => {
          toast.classList.remove('d-none');
        }, 1500);

        setTimeout(() => {
          closeToast();
        }, 9000);
      }
    });

    function closeToast() {
      const toast = document.getElementById('new-test-toast');
      if (toast) {
        toast.style.animation = 'fadeOut 0.5s forwards';
        setTimeout(() => {
          toast.remove();
        }, 500);
      }
    }
  </script>
</th:block>
</html>
