<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <title>비밀번호 확인 - 문답(MOONDAP)</title>
    <link th:href="@{/assets/css/admin-form.css}" rel="stylesheet">
    <link th:href="@{/assets/css/test-admin-common.css}" rel="stylesheet">
    <style>
        .verify-container {
            padding-top: 100px;
            padding-bottom: 100px;
            max-width: 500px;
            margin: 0 auto;
        }
        .verify-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .lock-icon {
            width: 70px;
            height: 70px;
            background: rgba(82, 77, 211, 0.1);
            color: #524dd3;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 25px;
        }
    </style>
</head>

<body layout:fragment="content">
    <main class="main">
        <section class="verify-container">
            <div class="container" data-aos="zoom-in">
                
                <div class="verify-card shadow-lg">
                    <div class="lock-icon">
                        <i class="bi bi-shield-lock-fill"></i>
                    </div>
                    
                    <h3 class="text-white fw-bold mb-2">비밀번호 재인증</h3>
                    <p class="text-white-50 mb-4 small">개인정보 보호를 위해 비밀번호를 다시 한번 입력해주세요.</p>

                    <!-- 에러 메시지 -->
                    <div th:if="${errorMsg}" class="alert alert-danger border-0 rounded-3 small mb-4 py-2" role="alert">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        <span th:text="${errorMsg}"></span>
                    </div>

                    <form th:action="@{/mypage/verify}" method="post">
                        <div class="leadership-slider mb-4">
                            <input type="password" name="password" class="custom-input text-center" 
                                   placeholder="현재 비밀번호를 입력하세요" required autofocus>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-3 fw-bold rounded-pill" style="background: #524dd3; border: none;">
                                인증하기
                            </button>
                            <a th:href="@{/mypage}" class="btn btn-link text-white-50 text-decoration-none small mt-2">
                                취소하고 돌아가기
                            </a>
                        </div>
                    </form>
                </div>

            </div>
        </section>
    </main>
</body>
</html>
