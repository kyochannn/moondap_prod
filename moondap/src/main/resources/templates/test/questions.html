<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <title th:text="${test.title} + ' - 질문 진행 중'">테스트 진행 중</title>
    <link th:href="@{/assets/css/question-page.css}" rel="stylesheet">
</head>

<body layout:fragment="content">
    <style>
        #previewToast {
            visibility: hidden; min-width: 250px; background-color: #ffc107; color: #000;
            text-align: center; border-radius: 10px; padding: 12px 24px; position: fixed;
            z-index: 10000; bottom: 50px; left: 50%; transform: translateX(-50%);
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #previewToast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 50px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 50px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>

    <div id="previewToast">
        <i class="bi bi-eye-fill me-2"></i>관리자 미리보기 모드입니다.
    </div>

    <main class="main">
        <div class="wizard-container" data-aos="fade-up">
            <!-- 프로그레스 바 -->
            <div class="test-progress">
                <div id="progressBar" class="test-progress-bar"></div>
            </div>

            <!-- 질문 노출 영역 -->
            <div id="questionContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3">질문을 준비하고 있습니다...</p>
                </div>
            </div>

            <!-- 하단 네비게이션 -->
            <div class="mt-4 d-flex justify-content-between align-items-center">
                <button id="prevBtn" class="btn btn-outline-light rounded-pill px-4" style="display:none;">
                    <i class="bi bi-arrow-left"></i> 이전
                </button>
                <div id="questionNumber" class="text-secondary fw-bold">1 / 1</div>
            </div>
        </div>

        <!-- 결과 전송 폼 (미리보기 상태 유지) -->
        <form id="submitForm" th:action="@{/test/{key}/submit(key=${test.testKey}, preview=${isPreview})}" method="post">
            <input type="hidden" id="answersInput" name="answers">
        </form>
    </main>

    <script th:inline="javascript">
        /*<![CDATA[*/
        window.onload = function() {
            const isPreview = /*[[${isPreview}]]*/ false;
            if (isPreview) {
                const previewToast = document.getElementById("previewToast");
                previewToast.style.visibility = "visible";
                previewToast.style.animation = "fadein 0.5s, fadeout 0.5s 2.5s";
                setTimeout(() => { previewToast.style.visibility = "hidden"; }, 3000);
            }
        };

        // 뒤로가기 시 로딩 오버레이 숨기기 처리
        window.addEventListener('pageshow', function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                if (typeof hideLoading === 'function') {
                    hideLoading();
                }
            }
        });

        // 서버에서 전달받은 질문 리스트 (Thymeleaf 리스트를 JS 객체로 변환)
        const questionsRaw = /*[[${test.questions}]]*/ [];
        const options = ["매우 그렇다", "그렇다", "보통이다", "그렇지 않다", "매우 그렇지 않다"];
        const optionScores = { "매우 그렇다": 5, "그렇다": 4, "보통이다": 3, "그렇지 않다": 2, "매우 그렇지 않다": 1 };
        
        let currentIndex = 0;
        const userAnswers = []; // 각 질문의 실제 점수(1~5)가 담길 예정

        const container = document.getElementById("questionContainer");
        const progressBar = document.getElementById("progressBar");
        const qNumberSpan = document.getElementById("questionNumber");
        const prevBtn = document.getElementById("prevBtn");

        function renderQuestion(index) {
            const q = questionsRaw[index];
            container.innerHTML = `
                <div class="question-item active">
                    <h4 class="question-title">Q${index + 1}. ${q.questionText}</h4>
                    <div class="options-list">
                        ${options.map((opt) => `
                            <div class="option-btn" onclick="selectOption(this, ${index}, '${opt}')">
                                <i class="bi bi-circle"></i>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            // UI 상태 업데이트
            const progress = ((index + 1) / questionsRaw.length) * 100;
            progressBar.style.width = `${progress}%`;
            qNumberSpan.innerText = `${index + 1} / ${questionsRaw.length}`;
            prevBtn.style.display = index > 0 ? 'block' : 'none';
        }

        window.selectOption = function(element, qIdx, optLabel) {
            // 점수 저장 (서버로 보낼 1~4점)
            userAnswers[qIdx] = optionScores[optLabel];
            
            // 시각적 피드백
            const optionsList = element.closest('.options-list');
            optionsList.classList.add('disabled');
            element.classList.add('selected');
            const icon = element.querySelector('i');
            if (icon) {
                icon.classList.remove('bi-circle');
                icon.classList.add('bi-check-circle-fill');
            }
            
            setTimeout(() => {
                if (qIdx < questionsRaw.length - 1) {
                    currentIndex++;
                    renderQuestion(currentIndex);
                } else {
                    finishTest();
                }
            }, 350);
        };

        function finishTest() {
            // 로딩 오버레이 (main_layout에 정의된 함수 사용 시도)
            if (typeof showLoading === 'function') {
                showLoading(0, '결과 분석 중...', '데이터를 바탕으로 성향을 분석하고 있습니다.');
            }
            
            // 답변 데이터를 JSON으로 변환하여 input에 저장
            document.getElementById("answersInput").value = JSON.stringify(userAnswers);
            
            setTimeout(() => {
                document.getElementById("submitForm").submit();
            }, 1000);
        }

        prevBtn.onclick = () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion(currentIndex);
            }
        };

        // 초기 시작
        if (questionsRaw.length > 0) {
            renderQuestion(currentIndex);
        } else {
            container.innerHTML = '<p class="text-center">등록된 질문이 없습니다.</p>';
        }
        /*]]>*/
    </script>
</body>
</html>
