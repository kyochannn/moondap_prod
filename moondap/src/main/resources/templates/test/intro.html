<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${test.title} + ' - 문답'">테스트 상세 정보</title>
    <link rel="stylesheet" th:href="@{/assets/css/testResult-page.css}">
    <style>
        #copyToast {
            visibility: hidden; min-width: 200px; background-color: #ffffff; color: #000;
            text-align: center; border-radius: 10px; padding: 12px 24px; position: fixed;
            z-index: 10000; bottom: 50px; left: 50%; transform: translateX(-50%);
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #copyToast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 50px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 50px; opacity: 1; } to { bottom: 0; opacity: 0; } }
        .test-intro-text { white-space: pre-wrap; }
    </style>
</head>

<body layout:fragment="content">
    <div id="copyToast"><i class="bi bi-check-circle-fill me-2"></i>링크가 복사되었습니다!</div>
    <div id="previewToast" style="visibility: hidden; min-width: 250px; background-color: #ffc107; color: #000;
            text-align: center; border-radius: 10px; padding: 12px 24px; position: fixed;
            z-index: 10000; bottom: 50px; left: 50%; transform: translateX(-50%);
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <i class="bi bi-eye-fill me-2"></i>관리자 미리보기 모드입니다.
    </div>

    <main class="main">
        <section id="game-gallery-details" class="game-gallery-details section">
            <div class="container" data-aos="fade-up" data-aos-delay="100">
                <div class="row gy-5">
                    <!-- 왼쪽 이미지 영역 -->
                    <div class="col-lg-4 mb-4 mb-lg-0">
                        <div class="game-gallery-details-media">
                            <div class="content-thumbnail-container">
                                <img th:src="${test.thumbnailImage != null and test.thumbnailImage != '' and test.thumbnailImage != 'default-content-img.png'} ? @{'/uploads/' + ${test.thumbnailImage}} : @{/assets/img/default-img/default-content-img.png}" 
                                     alt="테스트 썸네일" class="img-fluid content-thumbnail-img">
                            </div>
                        </div>
                    </div>

                    <!-- 오른쪽 콘텐츠 영역 -->
                    <div class="col-lg-8">
                        <div class="game-gallery-details-content">
                            <h4 class="project-title fw-bold mb-4 text-center text-lg-start" th:text="${test.title}">테스트 제목</h4>
                            
                            <div class="project-meta text-center text-lg-start">
                                <div class="date-client d-flex align-items-center justify-content-center justify-content-lg-start gap-3 flex-wrap">
                                    <div class="meta-item">
                                        <i class="bi bi-eye-fill"></i>
                                        <span th:text="(${test.playCount != null ? test.playCount : 0}) + '명 참여'">참여수</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="bi bi-tag-fill"></i>
                                        <span th:text="${test.categoryDisplayName != null ? test.categoryDisplayName : test.category}">카테고리</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="bi bi-stopwatch-fill"></i>
                                        <span th:text="'약 ' + ${test.estimatedTime} + '분 소요'">시간</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="bi bi-check-square-fill"></i>
                                        <span th:text="${#lists.size(test.questions)} + '문항'">문항수</span>
                                    </div>
                                </div>
                            </div>

                            <div class="button-group mb-4">
                                <div class="d-flex align-items-center gap-2">
                                    <button onclick="shareKakaoAction()" class="btn btn-warning rounded-pill px-3 py-2 fw-bold text-nowrap text-dark shadow-sm" style="background-color: #FEE500; border: none;">
                                        <i class="bi bi-chat-fill"></i> 공유
                                    </button>
                                    <button onclick="copyLinkAction()" class="btn btn-outline-info rounded-pill px-3 py-2 fw-bold shadow-sm">
                                        <i class="bi bi-link-45deg"></i> 링크 공유
                                    </button>
                                    
                                    <button th:onclick="|startTest('@{/test/{key}/questions(key=${test.testKey})}')|"
                                       class="btn btn-primary flex-grow-1 py-2 rounded-5 shadow-sm fw-bold"
                                       style="background: #524dd3; border: none;">
                                        테스트 시작 <i class="bi bi-arrow-right ms-1"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- 테스트 소개 섹션 (Premium Analysis Box Style) -->
                            <div class="mb-0">
                                <div class="d-flex align-items-center mb-3">
                                    <div style="width: 4px; height: 20px; background: #865EF4; border-radius: 2px; margin-right: 12px;"></div>
                                    <h5 class="fw-bold text-white mb-0">테스트 소개</h5>
                                </div>
                                <div class="analysis-box">
                                    <div class="analysis-text text-white" th:text="${test.description}">
                                        소개 내용이 들어갑니다.
                                    </div>
                                </div>
                            </div>

                            <!-- 결과 유형 미리보기 영역 (Premium Card Style) -->
                            <div class="text-start mt-4 mb-4" th:if="${test.results != null and !#lists.isEmpty(test.results)}">
                                <div class="d-flex align-items-center mb-3">
                                    <div style="width: 4px; height: 20px; background: #ffc107; border-radius: 2px; margin-right: 12px;"></div>
                                    <h5 class="fw-bold text-white mb-0">전체 결과 유형 미리보기</h5>
                                </div>
                                <div class="row row-cols-2 row-cols-md-4 g-3">
                                    <div class="col" th:each="res : ${test.results}">
                                        <div class="card h-100 text-center rounded-4 shadow-sm border-0 other-result-card"     
                                            style="background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(5px);" 
                                            th:data-title="${res.resultTitle}"
                                            th:data-image="${res.resultImage}"
                                            th:data-content="${res.resultContent}"
                                            onclick="handleOtherResultClick(this)">
                                            <div class="p-2">
                                                <img th:src="${res.resultImage != null and res.resultImage != ''} ? @{'/uploads/' + ${res.resultImage}} : '/assets/img/default-img/default-content-img.png'" 
                                                     class="img-fluid rounded-3 mb-2" alt="결과 이미지" 
                                                     style="aspect-ratio: 1 / 1; object-fit: cover; width: 100%; border: 1px solid rgba(255,255,255,0.1);"
                                                     onerror="this.onerror=null; this.src='/assets/img/default-img/default-content-img.png';">
                                                <h6 class="fw-bold text-white mb-0 small" th:text="${res.resultTitle}" 
                                                    style="word-break: keep-all; font-size: 0.8rem; line-height: 1.2;">유형 이름</h6>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <p class="text-white-50 mt-3 small text-center opacity-75">
                                    <i class="bi bi-info-circle me-1"></i> 각 유형을 클릭하면 상세 미리보기를 확인하실 수 있습니다.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 결과 상세 보기 모달 -->
        <div id="otherResultModal" class="other-result-modal" onclick="closeOtherResult(event)">
            <div class="other-result-modal-content" onclick="event.stopPropagation()">
                <h4 id="modalTitle" class="modal-result-title">유형 제목</h4>
                <img id="modalImage" src="" class="modal-result-img" onerror="this.src='/assets/img/default-img/default-content-img.png';">
                <div id="modalDescription" class="modal-result-description">
                    분석 내용이 여기에 표시됩니다.
                </div>
                <div class="d-flex justify-content-center gap-2 mt-4">
                    <button class="btn modal-close-btn rounded-pill px-5 py-2 fw-bold" onclick="closeOtherResult()">
                        닫기
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script th:inline="javascript">
        window.onload = function() {
            const isPreview = /*[[${isPreview}]]*/ false;
            if (isPreview) {
                const previewToast = document.getElementById("previewToast");
                previewToast.style.visibility = "visible";
                previewToast.style.animation = "fadein 0.5s, fadeout 0.5s 2.5s";
                setTimeout(() => { previewToast.style.visibility = "hidden"; }, 3000);
            }
        };

        function copyLinkAction() {
            copyLinkCommon(null, () => {
                const toast = document.getElementById("copyToast");
                toast.className = "show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
            });
        }

        function startTest(url) {
            if (typeof showLoading === 'function') {
                showLoading(0, '테스트를 준비하고 있습니다', '테스트로 만나는 또 다른 나, 문답!');
            }
            setTimeout(() => {
                location.href = url;
            }, 800);
        }

        // 카카오 공유 기능 연동
        function shareKakaoAction() {
            const testTitle = /*[[${test.title}]]*/ '';
            const testDesc = /*[[${test.description}]]*/ '';
            const testKey = /*[[${test.testKey}]]*/ '';
            const thumbImg = /*[[${test.thumbnailImage}]]*/ '';
            
            const shareUrl = window.location.origin + "/test/" + testKey;
            const imageUrl = thumbImg && thumbImg !== 'default-content-img.png' 
                             ? window.location.origin + "/uploads/" + thumbImg 
                             : window.location.origin + "/assets/img/default-img/default-content-img.png";

            shareKakaoCommon({
                title: testTitle,
                description: testDesc,
                imageUrl: imageUrl,
                shareUrl: shareUrl,
                buttonTitle: '테스트 하러가기'
            });
        }

        // 결과 상세 보기 모달 관련 함수
        function handleOtherResultClick(element) {
            const title = element.getAttribute('data-title');
            const image = element.getAttribute('data-image');
            const content = element.getAttribute('data-content');
            openOtherResult(title, image, content);
        }

        function openOtherResult(title, image, content) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalImage').src = image ? '/uploads/' + image : '/assets/img/default-img/default-content-img.png';
            document.getElementById('modalDescription').innerText = content;
            
            const modal = document.getElementById('otherResultModal');
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('active');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeOtherResult() {
            const modal = document.getElementById('otherResultModal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 300);
        }

        // 브라우저 뒤로가기 시 로딩 오버레이 숨기기
        window.onpageshow = function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                if (typeof hideLoading === 'function') {
                    hideLoading();
                }
            }
        };
    </script>
</body>
</html>
