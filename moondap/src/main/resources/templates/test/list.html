<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/layout/main_layout}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 테스트 리스트 - 문답</title>
  <style>
    .game-gallery {
      padding-top: 60px;
    }
    .type-tabs {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 20px;
      padding-bottom: 10px;
    }
    .type-tab {
      font-size: 1.1rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      padding: 5px 10px;
      position: relative;
      transition: all 0.3s;
      cursor: pointer;
      white-space: nowrap;
    }
    .type-tab:hover {
      color: #fff;
    }
    .type-tab.active {
      color: #fff;
    }
    .type-tab.active::after {
      content: '';
      position: absolute;
      bottom: -11px;
      left: 0;
      width: 100%;
      height: 3px;
      background: #524dd3;
      border-radius: 3px 3px 0 0;
    }
    .filter-toggle-area {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .filter-toggle-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 10px 25px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }
    .filter-toggle-btn:hover {
      background: rgba(82, 77, 211, 0.2);
      border-color: #524dd3;
    }
    .filter-toggle-btn i {
      transition: transform 0.3s ease;
    }
    .filter-toggle-btn.active .bi-chevron-down {
      transform: rotate(180deg);
    }
    
    /* 접히는 영역 스타일 */
    .collapsible-filters {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 0;
    }
    .collapsible-filters.show {
      max-height: 500px; /* 충분한 높이 */
      opacity: 1;
    }

    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      padding: 10px 0;
    }
    .category-chip {
      padding: 8px 20px;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ccc;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }
    .category-chip:hover, .category-chip.active {
      background: #524dd3;
      border-color: #524dd3;
      color: white;
      transform: translateY(-2px);
    }
    .sort-options {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }
    .sort-link {
      color: #999;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.3s;
    }
    .sort-link:hover, .sort-link.active {
      color: #524dd3;
      font-weight: bold;
    }
    .empty-state {
      padding: 100px 0;
      text-align: center;
      color: #666;
    }
    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
      opacity: 0.5;
    }
  </style>
</head>

<body layout:fragment="content">
  <main class="main">
    
    <section id="game-gallery" class="game-gallery section">
      <div class="container section-title" data-aos="fade-up">
        <h2>모든 테스트</h2>
        <p>나를 찾아가는 즐거운 여정, 문답의 모든 콘텐츠를 만나보세요.</p>
      </div>

      <div class="container">
        <!-- Content Type Tabs -->
        <div class="type-tabs" data-aos="fade-up">
          <a th:href="@{/test/list(type='all', category=${currentCategory}, sort=${currentSort})}" 
             class="type-tab" th:classappend="${currentType == 'all'} ? 'active' : ''"><i class="bi bi-grid me-2"></i>전체</a>
          <a th:href="@{/test/list(type='NORMAL', category=${currentCategory}, sort=${currentSort})}" 
             class="type-tab" th:classappend="${currentType == 'NORMAL'} ? 'active' : ''"><i class="bi bi-journal-check me-2"></i>테스트</a>
          <a th:href="@{/test/list(type='BALANCE', category=${currentCategory}, sort=${currentSort})}" 
             class="type-tab" th:classappend="${currentType == 'BALANCE'} ? 'active' : ''"><i class="bi bi-lightning-charge me-2"></i>밸런스게임</a>
        </div>

        <!-- Filter Toggle Button -->
        <div class="filter-toggle-area" data-aos="fade-up">
          <button class="filter-toggle-btn" id="filterToggle">
            <i class="bi bi-sliders2"></i>
            <span>필터 상세 설정</span>
            <i class="bi bi-chevron-down"></i>
          </button>
        </div>

        <!-- Collapsible Filter Section -->
        <div class="collapsible-filters" id="filterContent" data-aos="fade-up">
          <div class="filter-section">
            <div class="category-chips">
              <a th:href="@{/test/list(category='all', type=${currentType}, sort=${currentSort})}" 
                 class="category-chip" th:classappend="${currentCategory == 'all'} ? 'active' : ''">전체</a>
              <a th:each="cat : ${categories}" 
                 th:href="@{/test/list(category=${cat.categoryName}, type=${currentType}, sort=${currentSort})}" 
                 class="category-chip" 
                 th:classappend="${currentCategory == cat.categoryName} ? 'active' : ''"
                 th:text="${cat.displayName}">카테고리</a>
            </div>
          </div>
        </div>

        <!-- Sort Options -->
        <div class="sort-options" data-aos="fade-up">
          <a th:href="@{/test/list(category=${currentCategory}, type=${currentType}, sort='popular')}" 
             class="sort-link" th:classappend="${currentSort == 'popular'} ? 'active' : ''">인기순</a>
          <a th:href="@{/test/list(category=${currentCategory}, type=${currentType}, sort='latest')}" 
             class="sort-link" th:classappend="${currentSort == 'latest'} ? 'active' : ''">최신순</a>
        </div>

        <!-- AJAX Content Grid -->
        <div id="content-grid">
          <div th:if="${#lists.isEmpty(contentList)}" class="col-12 empty-state" data-aos="fade-up">
            <i class="bi bi-search"></i>
            <h4>검색 결과가 없습니다.</h4>
            <p>다른 카테고리를 선택해보세요!</p>
          </div>

          <div class="row gy-4" id="content-grid-items" th:fragment="content-grid-items">
            <div th:each="test : ${contentList}" class="col-xl-4 col-lg-6 game-item" data-aos="fade-up">
              <a th:href="${test.type == 'EGEN'} ? @{/egenTeto/selectEgenTetoGame} : (${test.type == 'NORMAL'} ? @{/test/{key}(key=${test.key})} : @{/balanceGame/selectBalanceGameView(id=${test.id})})" 
                 class="text-decoration-none d-block">
                <div class="game-wrapper">
                  <div class="game-image">
                    <div th:if="${test.isNew}" class="new-badge">NEW</div>
                    <th:block th:if="${test.type == 'BALANCE'}">
                      <div class="split-thumbnail">
                        <img th:src="${test.thumbnail != null and test.thumbnail != ''} ? (${#strings.startsWith(test.thumbnail, '/assets/')} ? ${test.thumbnail} : (@{/uploads/} + ${test.thumbnail})) : @{/assets/img/testList/img1.png}" 
                             alt="옵션1" class="img-left" loading="lazy">
                        <img th:src="${test.thumbnail2 != null and test.thumbnail2 != ''} ? (${#strings.startsWith(test.thumbnail2, '/assets/')} ? ${test.thumbnail2} : (@{/uploads/} + ${test.thumbnail2})) : @{/assets/img/testList/img2.png}" 
                             alt="옵션2" class="img-right" loading="lazy">
                        <div class="vs-badge">VS</div>
                      </div>
                    </th:block>
                    <th:block th:unless="${test.type == 'BALANCE'}">
                      <img th:src="${test.thumbnail != null and test.thumbnail != ''} ? (${#strings.startsWith(test.thumbnail, '/assets/')} ? ${test.thumbnail} : (@{/uploads/} + ${test.thumbnail})) : @{/assets/img/testList/img1.png}" 
                           alt="테스트 썸네일" class="img-fluid" loading="lazy">
                    </th:block>
                  </div>
                  <div class="game-content">
                    <div class="game-meta">
                      <span class="game-type">
                        <span th:if="${test.type == 'BALANCE' and test.isSpicy}" class="badge bg-danger rounded-pill me-1" style="font-size: 0.65rem; vertical-align: middle; padding: 3px 7px;">매운맛</span>
                        <span th:text="${test.type == 'NORMAL'} ? '테스트' : '밸런스게임'">테스트</span>
                      </span>
                      <div class="game-rating">
                        <i class="bi bi-eye-fill"></i>
                        <span th:text="${#numbers.formatInteger(test.playCount, 0, 'COMMA')}">0</span>
                      </div>
                    </div>
                    <h3 th:text="${test.title}">테스트 제목</h3>
                    <p th:text="${test.description != null ? test.description : '지금 문답에서 바로 확인해보세요!'}">설명</p>
                    <div class="game-type-bundle">
                      <span class="category-badge" th:text="${test.categoryName}">카테고리</span>
                    </div>
                  </div>
                </div>
              </a>
            </div>
          </div>

          <!-- Load More / Sentinel Container -->
          <div th:if="${hasMore}" class="text-center mt-5 mb-5" id="load-more-container" data-aos="fade-up">
            <button class="btn btn-primary rounded-pill px-5 py-2 fw-bold" id="loadMoreBtn" 
                    th:data-page="${currentPage + 1}">
              더보기 <i class="bi bi-plus-lg ms-1"></i>
            </button>
          </div>
        </div>

        <script th:inline="javascript">
          document.addEventListener('DOMContentLoaded', function() {
            const toggleBtn = document.getElementById('filterToggle');
            const filterContent = document.getElementById('filterContent');
            
            const currentCategory = /*[[${currentCategory}]]*/ 'all';
            
            if (currentCategory !== 'all') {
              filterContent.classList.add('show');
              toggleBtn.classList.add('active');
            }

            toggleBtn.addEventListener('click', function() {
              filterContent.classList.toggle('show');
              this.classList.toggle('active');
            });

            document.addEventListener('click', function(e) {
              const link = e.target.closest('.type-tab, .category-chip, .sort-link');
              if (!link) return;
              
              e.preventDefault();
              const url = link.getAttribute('href');
              loadContent(url, link);
            });

            function loadContent(url, activeLink) {
              const grid = document.getElementById('content-grid');
              grid.style.opacity = '0.5';
              grid.style.transition = 'opacity 0.2s';

              fetch(url, {
                headers: {
                  'X-Requested-With': 'XMLHttpRequest'
                }
              })
              .then(response => response.text())
              .then(html => {
                grid.outerHTML = html;
                history.pushState(null, '', url);
                updateActiveStates(activeLink);
                initInfiniteScroll(); // Re-init scroll observer
                
                if (typeof AOS !== 'undefined') {
                  AOS.refresh();
                }
              })
              .catch(error => {
                console.error('Error loading content:', error);
                grid.style.opacity = '1';
              });
            }

            function updateActiveStates(link) {
              if (link.classList.contains('type-tab')) {
                document.querySelectorAll('.type-tab').forEach(el => el.classList.remove('active'));
                link.classList.add('active');
              } else if (link.classList.contains('category-chip')) {
                document.querySelectorAll('.category-chip').forEach(el => el.classList.remove('active'));
                link.classList.add('active');
              } else if (link.classList.contains('sort-link')) {
                document.querySelectorAll('.sort-link').forEach(el => el.classList.remove('active'));
                link.classList.add('active');
              }
            }
            
            // 인피니티 스크롤 로직
            let isLoading = false;
            
            function initInfiniteScroll() {
              const loadMoreBtn = document.getElementById('loadMoreBtn');
              if (!loadMoreBtn) return;

              // 감시 지점으로 활용하기 위해 투명 처리
              loadMoreBtn.style.visibility = 'hidden';
              loadMoreBtn.style.height = '1px';
              loadMoreBtn.style.margin = '0';
              
              const observer = new IntersectionObserver((entries) => {
                const firstEntry = entries[0];
                if (firstEntry.isIntersecting && !isLoading) {
                  loadNextPage(loadMoreBtn);
                }
              }, {
                rootMargin: '300px' // 여유 있게 300px 전에 로딩
              });

              observer.observe(loadMoreBtn);
            }

            function loadNextPage(btn) {
              const page = btn.getAttribute('data-page');
              if (!page) return;

              isLoading = true;
              const container = document.getElementById('load-more-container');
              container.innerHTML = '<div class="spinner-border text-primary" role="status"><span class="visually-hidden">로딩 중...</span></div>';
              container.style.display = 'block';

              const currentUrl = new URL(window.location.href);
              currentUrl.searchParams.set('page', page);

              fetch(currentUrl.toString(), {
                headers: {
                  'X-Requested-With': 'XMLHttpRequest',
                  'X-Load-More': 'true'
                }
              })
              .then(response => response.text())
              .then(html => {
                const itemsContainer = document.getElementById('content-grid-items');
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                
                const newItems = tempDiv.querySelectorAll('.game-item');
                newItems.forEach(item => {
                  itemsContainer.appendChild(item);
                });
                
                const nextPage = parseInt(page) + 1;
                container.innerHTML = `<button id="loadMoreBtn" data-page="${nextPage}" style="visibility:hidden; height:1px; margin:0;"></button>`;
                
                isLoading = false;
                
                if (newItems.length < 6) {
                  container.style.display = 'none';
                  isLoading = true;
                } else {
                  initInfiniteScroll();
                }
                
                if (typeof AOS !== 'undefined') {
                  AOS.refresh();
                }
              })
              .catch(error => {
                console.error('Error loading more content:', error);
                isLoading = false;
              });
            }

            initInfiniteScroll();
            
            window.addEventListener('popstate', function() {
              location.reload();
            });
          });
        </script>
      </div>
    </section>
  </main>
</body>

</html>
