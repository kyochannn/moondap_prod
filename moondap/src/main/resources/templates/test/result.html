<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <title th:text="'테스트 결과 - ' + ${test.title}">테스트 결과</title>
    <link th:href="@{/assets/css/testResult-page.css}" rel="stylesheet">
</head>

<body layout:fragment="content">
    <div id="copyToast"><i class="bi bi-check-circle-fill me-2"></i>링크가 복사되었습니다!</div>
    <div id="previewToast"><i class="bi bi-eye-fill me-2"></i>관리자 미리보기 모드입니다.</div>

    <main class="main">
        <section id="starter-section" class="starter-section section p-3">
            <div class="container section-title pb-2" data-aos="fade-up">
                <h2 th:text="${test.title}" class="fw-bold text-white">테스트 제목</h2>
                <p class="text-white-50">테스트가 완료되었습니다! 당신의 리포트를 확인해 보세요.</p>
            </div>
        </section>

        <section class="section p-0">
            <div class="container pb-5" data-aos="fade-up">
                <div class="result-report-card mx-auto overflow-hidden shadow-lg">
                    
                    <!-- 상단 컬러 바 -->
                    <div class="report-accent-bar"></div>

                    <div class="p-4 p-md-5 text-center">
                        <!-- 결과 이미지 -->
                        <div class="position-relative d-inline-block mb-4">
                            <img th:src="${result.resultImage != null} ? @{'/uploads/' + ${result.resultImage}} : '/assets/img/default-img/default-content-img.png'" 
                                 class="img-fluid main-result-img shadow-lg">
                        </div>

                        <!-- 결과 타이틀 -->
                        <div class="mb-4">
                            <span class="text-white-50 small text-uppercase tracking-widest mb-2 d-block">당신의 유형은?</span>
                            <h3 class="fw-bold text-white" th:text="${result.resultTitle}">결과 타이틀</h3>
                        </div>

                        <!-- 점수형일 때 전용 게이지 섹션 -->
                        <div th:if="${test.testType == 'SCORE'}" class="score-visualization mb-5">
                            <div class="d-flex justify-content-between align-items-end mb-2">
                                <span class="text-white-50 small"><i class="bi bi-graph-up-arrow me-1"></i> 종합 점수</span>
                                <span class="fw-bold text-primary fs-3"><span th:text="${result.calculatedScore}">0</span>%</span>
                            </div>
                            <div class="progress score-progress">
                                <div class="progress-bar progress-bar-striped progress-bar-animated score-progress-bar" 
                                     role="progressbar" 
                                     style="width: 0%;"
                                     th:attr="data-score=${result.calculatedScore}"
                                     id="scoreProgressBar"></div>
                            </div>
                            <p class="mt-3 text-white-50 small mb-0">문항 분석을 통한 당신의 객관적인 수치입니다.</p>
                        </div>

                        <!-- 상세 설명 (본문) -->
                        <div class="text-start mb-5">
                            <div class="d-flex align-items-center mb-3">
                                <div style="width: 4px; height: 20px; background: #524dd3; border-radius: 2px; margin-right: 12px;"></div>
                                <h5 class="fw-bold text-white mb-0">상세 분석 리포트</h5>
                            </div>
                            <div class="analysis-box">
                                <p class="text-white mb-0 analysis-text" th:text="${result.resultContent}">
                                    상세 분석 내용이 출력됩니다.
                                </p>
                            </div>
                        </div>

                        <!-- 점수 계산 상세 내역 (Debug) -->
                        <div class="text-start mb-5">
                            <div class="d-flex align-items-center mb-3">
                                <div style="width: 4px; height: 20px; background: #0dcaf0; border-radius: 2px; margin-right: 12px;"></div>
                                <h5 class="fw-bold text-white mb-0">📊 점수 계산 상세 내역</h5>
                            </div>
                            <div class="card card-body bg-dark text-white border-0 small text-start p-0" style="background: rgba(255,255,255,0.03) !important; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05) !important;">
                                <div class="table-responsive">
                                    <table class="table table-dark-custom table-hover mb-0 align-middle">
                                        <thead>
                                            <tr>
                                                <th style="width: 35px;">#</th>
                                                <th>질문 문구</th>
                                                <th class="text-center" style="width: 50px;">선택</th>
                                                <th class="text-center" style="width: 50px;">점수</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="item, stat : ${result.breakdown}">
                                                <td th:text="${stat.count}" class="text-white">1</td>
                                                <td>
                                                    <span th:text="${item.questionText}">질문</span>
                                                    <span th:if="${item.isReverse}" class="badge bg-danger ms-1" style="font-size: 0.6rem; padding: 2px 4px;">R</span>
                                                </td>
                                                <td class="text-center" th:text="${item.originalAnswer}">3</td>
                                                <td class="text-center fw-bold text-warning">
                                                    <span th:text="${item.finalScore}">3</span>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- 다른 결과 유형 섹션 -->
                        <div class="text-start mb-4" th:if="${test.results != null and !#lists.isEmpty(test.results)}">
                            <div class="d-flex align-items-center mb-3">
                                <div style="width: 4px; height: 20px; background: #ffc107; border-radius: 2px; margin-right: 12px;"></div>
                                <h5 class="fw-bold text-white mb-0">다른 유형도 궁금하신가요?</h5>
                            </div>
                            <div class="row row-cols-2 row-cols-md-4 g-3">
                                <div class="col" th:each="res : ${test.results}">
                                    <div class="card h-100 text-center rounded-4 shadow-sm border-0" 
                                         style="background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(5px);">
                                        <div class="p-2">
                                            <img th:src="${res.resultImage != null and res.resultImage != ''} ? @{'/uploads/' + ${res.resultImage}} : @{/assets/img/default-img/default-content-img.png}" 
                                                 class="img-fluid rounded-3 mb-2" alt="결과 이미지" 
                                                 style="aspect-ratio: 1 / 1; object-fit: cover; width: 100%; border: 1px solid rgba(255,255,255,0.1);">
                                            <h6 class="fw-bold text-white mb-0 small" th:text="${res.resultTitle}" 
                                                style="word-break: keep-all; font-size: 0.8rem; line-height: 1.2;">유형 이름</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 액션 버튼 -->
                        <div class="mt-5 d-flex flex-wrap justify-content-center gap-3">
                            <a th:href="@{/test/{key}(key=${test.testKey})}" class="btn btn-primary rounded-pill px-4 py-2 fw-bold shadow-sm btn-result-action">
                                <i class="bi bi-arrow-repeat me-1"></i> 다시 하기
                            </a>
                            <button onclick="copyLinkAction()" class="btn btn-outline-light rounded-pill px-4 py-2 fw-bold shadow-sm">
                                <i class="bi bi-share-fill me-1"></i> 공유하기
                            </button>
                            <a href="/" class="btn btn-link text-white-50 text-decoration-none w-100 mt-2 small">
                                <i class="bi bi-house-door me-1"></i> 메인으로 돌아가기
                            </a>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script th:inline="javascript">
        window.onload = function() {
            // 프리뷰 모드 토스트
            const isPreview = /*[[${isPreview}]]*/ false;
            if (isPreview) {
                const previewToast = document.getElementById("previewToast");
                previewToast.style.visibility = "visible";
                previewToast.style.animation = "fadein 0.5s, fadeout 0.5s 2.5s";
                setTimeout(() => { previewToast.style.visibility = "hidden"; }, 3000);
            }

            // 점수 게이지 애니메이션
            const progressBar = document.getElementById("scoreProgressBar");
            if (progressBar) {
                const targetScore = progressBar.getAttribute("data-score");
                setTimeout(() => {
                    progressBar.style.width = targetScore + "%";
                }, 300);
            }
        };

        function copyLinkAction() {
            const shareUrl = /*[[${shareUrl}]]*/ window.location.href;
            copyToClipboard(shareUrl, () => {
                const toast = document.getElementById("copyToast");
                toast.className = "show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
            });
        }
    </script>
</body>
</html>
