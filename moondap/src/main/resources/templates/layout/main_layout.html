<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- goole ads -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5509463812555494"
     crossorigin="anonymous"></script>
    <!-- link -->
    <th:block th:replace="~{fragment/link::link}"></th:block>
</head>
<body>
    <!-- 로딩 오버레이 (작업 중 화면 차단) -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">이미지를 처리하고 있습니다...</p>
    </div>

    <!-- header -->
    <th:block th:replace="~{fragment/header::header}"></th:block>

    <!-- ⭐ content -->
    <!-- layout:fragment="레이아웃의 프레그먼트 영역 이름" -->
    <th:block layout:fragment="content"></th:block>
    
    <!-- footer -->
    <th:block th:replace="~{fragment/footer::footer}"></th:block>

    <!-- script -->
    <th:block th:replace="~{fragment/script::script}"></th:block>
</body>
</html>
