<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <title>밸런스 게임 관리 - 관리자</title>
    <link th:href="@{/assets/css/test-admin-common.css}" rel="stylesheet">
    <style>
        .table-dark-custom {
            --bs-table-striped-bg: rgba(255,255,255,0.03);
            min-width: 1000px;
            table-layout: fixed;
        }
        .table-dark-custom thead th {
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .table-dark-custom td, .table-dark-custom th {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .action-btn {
            padding: 4px 12px;
            font-size: 0.78rem;
            border-radius: 20px;
        }
        .option-img-mini {
            width: 30px;
            height: 30px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .vs-divider {
            color: #ff4d4d;
            font-weight: bold;
            font-size: 0.7rem;
            margin: 0 4px;
        }
    </style>
</head>

<body layout:fragment="content">
    <main class="main">
        <section class="section">
            <div class="container" data-aos="fade-up">

                <!-- 페이지 헤더 -->
                <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
                    <div>
                        <h4 class="fw-bold text-white mb-1">[[${manageTitle != null ? '⚖️ ' + manageTitle : '⚖️ 밸런스 게임 관리'}]]</h4>
                        <p class="text-white-50 mb-0 small">밸런스 게임을 생성하고 질문을 관리합니다.</p>
                    </div>
                    <a href="/balanceGame/insertBalanceGameView" class="btn btn-primary rounded-pill px-4"
                       style="background:#524dd3; border:none;">
                        <i class="bi bi-plus-lg me-1"></i> 새 밸런스 게임 추가
                    </a>
                </div>

                <!-- 플래시 메시지 -->
                <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${successMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${errorMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- 목록 테이블 -->
                <div class="admin-card p-1 p-md-4">
                    <div th:if="${#lists.isEmpty(balanceList)}" class="text-center py-5 text-white-50">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        <p>등록된 밸런스 게임이 없습니다.</p>
                        <a href="/balanceGame/insertBalanceGameView" class="btn btn-outline-light rounded-pill mt-1">첫 게임 만들기</a>
                    </div>

                    <div th:if="${!#lists.isEmpty(balanceList)}" class="table-responsive">
                        <table class="table table-dark-custom table-hover align-middle mb-0 text-center">
                            <thead>
                                <tr>
                                    <th style="width: 50px;" class="sortable" onclick="sortTable(0)">#</th>
                                    <th style="width: 100px;" class="sortable" onclick="sortTable(1)">ID</th>
                                    <th style="width: auto;" class="sortable" onclick="sortTable(2)">제목</th>
                                    <th style="width: 200px;">옵션 1 / 2</th>
                                    <th style="width: 120px;" class="sortable" onclick="sortTable(4)">카테고리</th>
                                    <th style="width: 100px;" class="sortable" onclick="sortTable(5)">작성자</th>
                                    <th style="width: 100px;" class="sortable" onclick="sortTable(6)">상태</th>
                                    <th style="width: 100px;" class="sortable" onclick="sortTable(7)">참여수</th>
                                    <th style="width: 180px;">관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="game, stat : ${balanceList}">
                                    <td class="text-white small" th:text="${stat.count}"></td>
                                    <td>
                                        <code class="text-info small" th:text="${game.id}"></code>
                                    </td>
                                    <td class="text-white text-start px-3">
                                        <span th:text="${game.title}" class="small"></span>
                                        <span th:if="${game.isSpicy}" class="badge bg-danger ms-1" style="font-size: 0.6rem;">매운맛</span>
                                    </td>
                                    <td>
                                        <div class="d-flex align-items-center justify-content-center">
                                            <img th:src="${#strings.startsWith(game.option1ImagePath, '/assets/')} ? ${game.option1ImagePath} : @{'/uploads/' + ${game.option1ImagePath}}" class="option-img-mini">
                                            <span class="vs-divider">vs</span>
                                            <img th:src="${#strings.startsWith(game.option2ImagePath, '/assets/')} ? ${game.option2ImagePath} : @{'/uploads/' + ${game.option2ImagePath}}" class="option-img-mini">
                                        </div>
                                        <div class="mt-1 small text-white-50" style="font-size: 0.7rem;">
                                            [[${game.option1Text}]] vs [[${game.option2Text}]]
                                        </div>
                                    </td>
                                    <td>
                                        <span class="admin-badge badge-domain" th:text="${game.categoryDisplayName != null ? game.categoryDisplayName : game.category}"></span>
                                    </td>
                                    <td class="text-white small" th:text="${game.userId != null ? game.userId : '-'}"></td>
                                    <td>
                                        <span th:if="${game.status == 'active'}" class="admin-badge badge-status-active">✅ 공개</span>
                                        <span th:if="${game.status == 'draft'}" class="admin-badge badge-status-draft">🚧 준비 중</span>
                                        <span th:if="${game.status == 'inactive'}" class="admin-badge badge-status-inactive">🔒 비공개</span>
                                    </td>
                                    <td class="text-white small">
                                        [[${game.totalCount != null ? game.totalCount : 0}]]명
                                    </td>
                                    <td>
                                        <div class="d-flex gap-1 justify-content-center flex-wrap">
                                            <a th:href="@{/balanceGame/selectBalanceGameView(id=${game.id})}"
                                               target="_blank"
                                               class="btn btn-outline-info action-btn"
                                               title="미리보기">
                                                <i class="bi bi-eye"></i>
                                            </a>
                                            <a th:href="@{/balanceGame/updateBalanceGameView(id=${game.id})}"
                                               class="btn btn-primary action-btn"
                                               title="수정">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <form th:id="'deleteForm' + ${game.id}" th:action="@{/balanceGame/manage/{id}/delete(id=${game.id})}" method="post" style="display:inline;">
                                                <input type="hidden" name="oldOption1ImagePath" th:value="${game.option1ImagePath}">
                                                <input type="hidden" name="oldOption2ImagePath" th:value="${game.option2ImagePath}">
                                                <button type="button" class="btn btn-danger action-btn"
                                                        th:data-form-id="'deleteForm' + ${game.id}"
                                                        onclick="if(confirm('정말로 삭제하시겠습니까?')) document.getElementById(this.getAttribute('data-form-id')).submit(); event.stopPropagation();"
                                                        title="삭제">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </section>
    </main>
    <script th:src="@{/assets/js/admin-table-sorter.js}"></script>
</body>
</html>
