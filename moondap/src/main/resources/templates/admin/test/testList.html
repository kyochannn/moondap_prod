<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <title>테스트 관리 - 어드민</title>
    <style>
        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(4px);
        }
        .table-dark-custom {
            --bs-table-bg: transparent;
            --bs-table-striped-bg: rgba(255,255,255,0.03);
            --bs-table-hover-bg: rgba(255,255,255,0.06);
            color: #fff;
        }
        .table-dark-custom thead th {
            border-bottom: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .table-dark-custom td, .table-dark-custom th {
            border-color: rgba(255,255,255,0.06);
            vertical-align: middle;
        }
        .badge-status-active   { background: rgba(34,197,94,0.2);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3);  }
        .badge-status-draft    { background: rgba(234,179,8,0.2);  color: #fbbf24; border: 1px solid rgba(234,179,8,0.3);  }
        .badge-status-inactive { background: rgba(156,163,175,0.2); color: #9ca3af; border: 1px solid rgba(156,163,175,0.3); }
        .action-btn {
            padding: 4px 12px;
            font-size: 0.78rem;
            border-radius: 20px;
        }
        .toast-msg {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 24px;
            border-radius: 10px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10000; display: none;
        }
    </style>
</head>

<body layout:fragment="content">
    <div id="toastMsg" class="toast-msg"></div>

    <main class="main">
        <section class="section">
            <div class="container" data-aos="fade-up">

                <!-- 페이지 헤더 -->
                <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
                    <div>
                        <h4 class="fw-bold text-white mb-1">🗂️ 테스트 관리</h4>
                        <p class="text-white-50 mb-0 small">테스트를 생성하고 질문을 관리합니다.</p>
                    </div>
                    <a href="/admin/test/new" class="btn btn-primary rounded-pill px-4"
                       style="background:#524dd3; border:none;">
                        <i class="bi bi-plus-lg me-1"></i> 새 테스트 추가
                    </a>
                </div>

                <!-- 플래시 메시지 -->
                <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${successMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${errorMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- 테스트 목록 테이블 -->
                <div class="admin-card p-3 p-md-4">
                    <div th:if="${#lists.isEmpty(testList)}" class="text-center py-5 text-white-50">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        <p>등록된 테스트가 없습니다.</p>
                        <a href="/admin/test/new" class="btn btn-outline-light rounded-pill mt-1">첫 테스트 만들기</a>
                    </div>

                    <div th:if="${!#lists.isEmpty(testList)}" class="table-responsive">
                        <table class="table table-dark-custom table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>테스트 키</th>
                                    <th>제목</th>
                                    <th>카테고리</th>
                                    <th>상태</th>
                                    <th class="text-center">질문수</th>
                                    <th class="text-center">관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="test, stat : ${testList}">
                                    <td class="text-white-50 small" th:text="${stat.count}"></td>
                                    <td>
                                        <code class="text-info small" th:text="${test.testKey}"></code>
                                    </td>
                                    <td class="fw-semibold" th:text="${test.title}"></td>
                                    <td class="text-white-50 small" th:text="${test.category != null ? test.category : '-'}"></td>
                                    <td>
                                        <span th:classappend="${test.status == 'active'} ? 'badge-status-active' : (${test.status == 'draft'} ? 'badge-status-draft' : 'badge-status-inactive')"
                                              class="badge rounded-pill px-2 py-1 small"
                                              th:text="${test.status}"></span>
                                    </td>
                                    <td class="text-center">
                                        <span class="badge bg-secondary rounded-pill" th:text="${test.questionCount} + '개'"></span>
                                    </td>
                                    <td class="text-center">
                                        <div class="d-flex gap-1 justify-content-center flex-wrap">
                                            <a th:href="@{/admin/test/{id}/questions(id=${test.id})}"
                                               class="btn btn-outline-info action-btn">
                                                <i class="bi bi-list-ul"></i> 질문
                                            </a>
                                            <a th:href="@{/admin/test/{id}/edit(id=${test.id})}"
                                               class="btn btn-outline-warning action-btn">
                                                <i class="bi bi-pencil"></i> 수정
                                            </a>
                                            <form th:action="@{/admin/test/{id}/delete(id=${test.id})}" method="post"
                                                  onsubmit="return confirm('정말 삭제하시겠습니까?\n연관된 질문도 함께 삭제됩니다.')">
                                                <button type="submit" class="btn btn-outline-danger action-btn">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </section>
    </main>
</body>
</html>
