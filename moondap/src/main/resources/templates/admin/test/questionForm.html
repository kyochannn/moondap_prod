<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <title th:text="${question.id != null} ? '질문 수정' : '질문 추가'">질문 폼 - 어드민</title>
    <style>
        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(4px);
        }
        .form-label { color: rgba(255,255,255,0.8); font-size: 0.9rem; font-weight: 500; }
        .form-control, .form-select {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 10px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.12);
            border-color: #524dd3;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(82,77,211,0.25);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.3); }
        .form-select option { background: #1a1b2e; color: #fff; }
        .form-check-input {
            width: 1.2em; height: 1.2em;
            background-color: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }
        .form-check-input:checked {
            background-color: #524dd3;
            border-color: #524dd3;
        }
        .info-box {
            background: rgba(82,77,211,0.1);
            border: 1px solid rgba(82,77,211,0.25);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.83rem;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>

<body layout:fragment="content">
    <main class="main">
        <section class="section">
            <div class="container" data-aos="fade-up" style="max-width: 680px;">

                <!-- 페이지 헤더 -->
                <div class="d-flex align-items-center gap-3 mb-4">
                    <a th:href="@{/admin/test/{id}/questions(id=${test.id})}"
                       class="btn btn-outline-light btn-sm rounded-pill">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <div>
                        <p class="text-white-50 small mb-0" th:text="${test.title}"></p>
                        <h5 class="fw-bold text-white mb-0"
                            th:text="${question.id != null} ? '✏️ 질문 수정' : '➕ 질문 추가'"></h5>
                    </div>
                </div>

                <!-- 폼 -->
                <div class="admin-card p-4">
                    <form th:action="${question.id != null}
                              ? @{/admin/test/{tid}/questions/{qid}/update(tid=${test.id},qid=${question.id})}
                              : @{/admin/test/{tid}/questions/create(tid=${test.id})}"
                          method="post">

                        <!-- 순서 (생성 시 자동, 수정 시 표시만) -->
                        <div class="mb-3" th:if="${question.id != null}">
                            <label class="form-label">질문 순서</label>
                            <input type="text" class="form-control" th:value="${(question.questionOrder != null ? question.questionOrder : '0') + '번'}" disabled>
                            <div class="form-text text-white-50 small mt-1">순서는 변경할 수 없습니다.</div>
                        </div>
                        <div class="mb-1 info-box" th:if="${question.id == null}">
                            <i class="bi bi-info-circle me-1"></i>
                            질문 순서는 자동으로 부여됩니다 (현재 질문 수 + 1).
                        </div>

                        <!-- 질문 내용 -->
                        <div class="mb-3 mt-3">
                            <label class="form-label">질문 내용 <span class="text-danger">*</span></label>
                            <textarea name="questionText" class="form-control" rows="4"
                                      placeholder="질문 내용을 입력하세요. 이모지 사용 가능 😊"
                                      required th:text="${question.questionText}"></textarea>
                        </div>

                        <!-- 도메인 -->
                        <div class="mb-3">
                            <label class="form-label">도메인 <span class="text-white-50 fw-normal small">(선택, 향후 채점에 사용)</span></label>
                            <input type="text" name="domain" class="form-control"
                                   placeholder="예: style_selfcare, social_skill, inner_tendency, ambition"
                                   th:value="${question.domain}">
                        </div>

                        <!-- 역채점 여부 -->
                        <div class="mb-4">
                            <div class="form-check form-switch d-flex align-items-center gap-3">
                                <input class="form-check-input" type="checkbox" name="reverse" value="true"
                                       id="isReverseCheck" th:checked="${question.reverse}" role="switch">
                                <div>
                                    <label class="form-check-label text-white fw-semibold" for="isReverseCheck">
                                        역채점 문항
                                    </label>
                                    <p class="text-white-50 small mb-0">체크 시 점수가 반전됩니다 (에겐형 성향 문항 등)</p>
                                </div>
                            </div>
                        </div>

                        <!-- 버튼 -->
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/admin/test/{id}/questions(id=${test.id})}"
                               class="btn btn-outline-light rounded-pill px-4">취소</a>
                            <button type="submit" class="btn btn-primary rounded-pill px-4"
                                    style="background:#524dd3; border:none;">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${question.id != null} ? '수정 저장' : '질문 추가'"></span>
                            </button>
                        </div>

                    </form>
                </div>

            </div>
        </section>
    </main>
</body>
</html>
