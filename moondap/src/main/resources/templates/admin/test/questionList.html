<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <title th:text="${test.title} + ' - 질문 관리'">질문 관리 - 어드민</title>
    <link th:href="@{/assets/css/test-admin-common.css}" rel="stylesheet">
    <style>
        .q-text {
            max-width: 420px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body layout:fragment="content">
    <main class="main">
        <section class="section">
            <div class="container" data-aos="fade-up">

                <!-- 페이지 헤더 -->
                <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
                    <div class="d-flex align-items-center gap-3">
                        <div>
                            <p class="text-white-50 small mb-0">테스트 관리</p>
                            <h5 class="fw-bold text-white mb-0" th:text="${test.title}"></h5>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="/admin/test/list" class="btn btn-outline-light rounded-pill px-4" style="font-size: 0.85rem; padding: 6px 16px;">
                            <i class="bi bi-arrow-left me-1"></i> 이전
                        </a>
                        <a th:href="@{/admin/test/{id}/edit(id=${test.id})}"
                           class="btn btn-primary rounded-pill px-4" style="background:#524dd3; border:none; font-size: 0.85rem; padding: 6px 16px;">
                            <i class="bi bi-pencil-square me-1"></i> 테스트 수정
                        </a>
                    </div>
                </div>

                <!-- 플래시 메시지 -->
                <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${successMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${errorMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- 테스트 기본 정보 -->
                <div class="admin-card p-3 p-md-4 mb-4">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <i class="bi bi-info-circle text-info"></i>
                        <h6 class="text-white mb-0 fw-bold">테스트 기본 정보</h6>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-dark-custom table-hover align-middle mb-0 text-center">
                            <thead>
                                <tr>
                                    <th style="width:120px">키</th>
                                    <th style="width:80px">이미지</th>
                                    <th>제목</th>
                                    <th style="width:120px">카테고리</th>
                                    <th style="width:100px">상태</th>
                                    <th style="width:80px">시간</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><code class="text-info" th:text="${test.testKey}"></code></td>
                                    <td>
                                        <a th:if="${test.thumbnailImage != null and test.thumbnailImage != ''}"
                                           th:href="@{'/uploads/' + ${test.thumbnailImage}}"
                                           class="glightbox"
                                           th:title="${test.title}">
                                            <img th:src="@{'/uploads/' + ${test.thumbnailImage}}"
                                                 class="rounded shadow-sm"
                                                 style="width: 50px; height: 50px; object-fit: cover; cursor: pointer;">
                                        </a>
                                        <span th:if="${test.thumbnailImage == null or test.thumbnailImage == ''}" class="text-white-50 small">-</span>
                                    </td>
                                    <td class="text-white small" th:text="${test.title}"></td>
                                    <td class="text-white small" th:text="${test.category}"></td>
                                    <td>
                                        <span th:classappend="${test.status == 'active'} ? 'badge-status-active' : (${test.status == 'draft'} ? 'badge-status-draft' : 'badge-status-inactive')"
                                              class="badge rounded-pill px-2 py-1 small"
                                              th:text="${test.status}"></span>
                                    </td>
                                    <td class="text-white small" th:text="${test.estimatedTime} + '분'"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- 테스트 설명 영역 별도 분리 -->
                    <div class="mt-3 p-3 rounded-3" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);">
                        <div class="text-white-50 small mb-2"><i class="bi bi-chat-left-text me-1"></i>테스트 설명</div>
                        <div class="text-white small" style="white-space: pre-wrap; line-height: 1.6;" th:text="${test.description}"></div>
                    </div>
                </div>

                <!-- 결과 유형 목록 -->
                <div class="admin-card p-3 p-md-4 mb-4">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <i class="bi bi-trophy text-warning"></i>
                        <h6 class="text-white mb-0 fw-bold">결과 유형 (분석 유형)</h6>
                    </div>
                    <div th:if="${#lists.isEmpty(test.results)}" class="text-center py-4 text-white-50">
                        <p class="mb-0">등록된 결과 유형이 없습니다.</p>
                    </div>
                    <div th:if="${!#lists.isEmpty(test.results)}" class="table-responsive">
                        <table class="table table-dark-custom table-hover align-middle mb-0 text-center">
                            <thead>
                                <tr>
                                    <th style="width:50px">#</th>
                                    <th style="width:80px">이미지</th>
                                    <th style="width:150px">결과 유형</th>
                                    <th>상세 설명</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="r, stat : ${test.results}">
                                    <td class="text-white small" th:text="${stat.count}"></td>
                                    <td>
                                        <a th:if="${r.resultImage != null and r.resultImage != ''}"
                                           th:href="@{'/uploads/' + ${r.resultImage}}"
                                           class="glightbox"
                                           th:title="${r.resultTitle}">
                                            <img th:src="@{'/uploads/' + ${r.resultImage}}"
                                                 class="rounded shadow-sm"
                                                 style="width: 50px; height: 50px; object-fit: cover; cursor: pointer;">
                                        </a>
                                        <span th:if="${r.resultImage == null or r.resultImage == ''}" class="text-white-50 small">-</span>
                                    </td>
                                    <td>
                                        <span class="badge-domain" th:text="${r.resultTitle}"></span>
                                    </td>
                                    <td class="text-start">
                                        <div class="text-white-50 small text-truncate" 
                                             style="max-width: 500px;" 
                                             th:text="${r.resultContent}"
                                             th:title="${r.resultContent}"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 질문 목록 -->
                <div class="admin-card p-3 p-md-4">

                    <div th:if="${#lists.isEmpty(questions)}" class="text-center py-5 text-white-50">
                        <i class="bi bi-question-circle fs-1 d-block mb-2"></i>
                        <p>아직 질문이 없습니다.</p>
                        <a th:href="@{/admin/test/{id}/edit(id=${test.id})}"
                           class="btn btn-outline-light rounded-pill px-4">질문 구성하러 가기</a>
                    </div>

                    <div th:if="${!#lists.isEmpty(questions)}" class="table-responsive">
                        <table class="table table-dark-custom table-hover align-middle mb-0 text-center">
                            <thead>
                                <tr>
                                    <th style="width:50px">#</th>
                                    <th>질문 내용</th>
                                    <th style="width:150px">결과 유형</th>
                                    <th style="width:100px">역채점</th>
                                    <th style="width:120px">관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="q, stat : ${questions}">
                                    <td class="text-white small" th:text="${stat.count}"></td>
                                    <td class="text-start">
                                        <div class="q-text text-white small" th:text="${q.questionText}"
                                              th:title="${q.questionText}"></div>
                                    </td>
                                    <td>
                                        <span th:if="${q.domain != null and !#strings.isEmpty(q.domain)}"
                                              class="badge-domain" th:text="${q.domain}"></span>
                                        <span th:if="${q.domain == null or #strings.isEmpty(q.domain)}"
                                              class="text-white-50 small">-</span>
                                    </td>
                                    <td>
                                        <span th:if="${q.reverse == true}" class="badge-reverse">역채점</span>
                                        <span th:if="${q.reverse != true}" class="text-white-50 small">-</span>
                                    </td>
                                    <td>
                                        <div class="d-flex gap-1 justify-content-center">
                                            <a th:href="@{/admin/test/{tid}/questions/{qid}/edit(tid=${test.id},qid=${q.id})}"
                                               class="btn btn-outline-warning action-btn">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <form th:action="@{/admin/test/{tid}/questions/{qid}/delete(tid=${test.id},qid=${q.id})}"
                                                  method="post"
                                                  onsubmit="return confirm('이 질문을 삭제하시겠습니까?')">
                                                <button type="submit" class="btn btn-outline-danger action-btn">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 총 질문 수 -->
                    <div th:if="${!#lists.isEmpty(questions)}"
                         class="text-end text-white-50 small mt-3">
                        총 <span th:text="${#lists.size(questions)}"></span>개 질문
                    </div>
                </div>

            </div>
        </section>
    </main>
</body>
</html>
