<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <title th:text="${test.title} + ' - 질문 관리'">질문 관리 - 어드민</title>
    <style>
        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(4px);
        }
        .table-dark-custom {
            --bs-table-bg: transparent;
            --bs-table-hover-bg: rgba(255,255,255,0.06);
            color: #fff;
        }
        .table-dark-custom thead th {
            border-bottom: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .table-dark-custom td, .table-dark-custom th {
            border-color: rgba(255,255,255,0.06);
            vertical-align: middle;
        }
        .q-text {
            max-width: 420px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .action-btn { padding: 4px 12px; font-size: 0.78rem; border-radius: 20px; }
        .order-badge {
            width: 28px; height: 28px;
            background: rgba(82,77,211,0.3);
            border: 1px solid rgba(82,77,211,0.5);
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; color: #a5a0ff;
        }
        .badge-reverse {
            background: rgba(239,68,68,0.2); color: #f87171;
            border: 1px solid rgba(239,68,68,0.3);
            font-size: 0.7rem; padding: 2px 8px; border-radius: 20px;
        }
        .badge-domain {
            background: rgba(14,165,233,0.2); color: #38bdf8;
            border: 1px solid rgba(14,165,233,0.3);
            font-size: 0.7rem; padding: 2px 8px; border-radius: 20px;
        }
    </style>
</head>

<body layout:fragment="content">
    <main class="main">
        <section class="section">
            <div class="container" data-aos="fade-up">

                <!-- 페이지 헤더 -->
                <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
                    <div class="d-flex align-items-center gap-3">
                        <a href="/admin/test/list" class="btn btn-outline-light btn-sm rounded-pill">
                            <i class="bi bi-arrow-left"></i>
                        </a>
                        <div>
                            <p class="text-white-50 small mb-0">테스트 질문 관리</p>
                            <h5 class="fw-bold text-white mb-0" th:text="${test.title}"></h5>
                        </div>
                    </div>
                    <a th:href="@{/admin/test/{id}/questions/new(id=${test.id})}"
                       class="btn btn-primary rounded-pill px-4" style="background:#524dd3; border:none;">
                        <i class="bi bi-plus-lg me-1"></i> 질문 추가
                    </a>
                </div>

                <!-- 플래시 메시지 -->
                <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${successMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${errorMsg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- 질문 목록 -->
                <div class="admin-card p-3 p-md-4">

                    <div th:if="${#lists.isEmpty(questions)}" class="text-center py-5 text-white-50">
                        <i class="bi bi-question-circle fs-1 d-block mb-2"></i>
                        <p>아직 질문이 없습니다.</p>
                        <a th:href="@{/admin/test/{id}/questions/new(id=${test.id})}"
                           class="btn btn-outline-light rounded-pill">첫 질문 추가하기</a>
                    </div>

                    <div th:if="${!#lists.isEmpty(questions)}" class="table-responsive">
                        <table class="table table-dark-custom table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th style="width:50px">순서</th>
                                    <th>질문 내용</th>
                                    <th>도메인</th>
                                    <th class="text-center">역채점</th>
                                    <th class="text-center">관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="q : ${questions}">
                                    <td class="text-center">
                                        <span class="order-badge" th:text="${q.questionOrder}"></span>
                                    </td>
                                    <td>
                                        <span class="q-text" th:text="${q.questionText}"
                                              th:title="${q.questionText}"></span>
                                    </td>
                                    <td>
                                        <span th:if="${q.domain != null and !#strings.isEmpty(q.domain)}"
                                              class="badge-domain" th:text="${q.domain}"></span>
                                        <span th:if="${q.domain == null or #strings.isEmpty(q.domain)}"
                                              class="text-white-50 small">-</span>
                                    </td>
                                    <td class="text-center">
                                        <span th:if="${q.reverse == true}" class="badge-reverse">역채점</span>
                                        <span th:if="${q.reverse != true}" class="text-white-50 small">-</span>
                                    </td>
                                    <td class="text-center">
                                        <div class="d-flex gap-1 justify-content-center">
                                            <a th:href="@{/admin/test/{tid}/questions/{qid}/edit(tid=${test.id},qid=${q.id})}"
                                               class="btn btn-outline-warning action-btn">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <form th:action="@{/admin/test/{tid}/questions/{qid}/delete(tid=${test.id},qid=${q.id})}"
                                                  method="post"
                                                  onsubmit="return confirm('이 질문을 삭제하시겠습니까?')">
                                                <button type="submit" class="btn btn-outline-danger action-btn">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 총 질문 수 -->
                    <div th:if="${!#lists.isEmpty(questions)}"
                         class="text-end text-white-50 small mt-3">
                        총 <span th:text="${#lists.size(questions)}"></span>개 질문
                    </div>
                </div>

            </div>
        </section>
    </main>
</body>
</html>
