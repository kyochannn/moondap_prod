<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layout/main_layout}"
      >
<head>
    <meta charset="UTF-8">
    <title>문답 - 가입 완료</title>
    <link th:href="@{/assets/css/admin-form.css}" rel="stylesheet">
    <link th:href="@{/assets/css/test-admin-common.css}" rel="stylesheet">
    <style>
        .success-bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(82, 77, 211, 0.15) 0%, rgba(82, 77, 211, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>

<body layout:fragment="content">
    <div class="container pb-5">
        <section class="section py-1">
            <div class="container px-0" data-aos="fade-up">
                
                <div class="row pt-5 mt-5">
                    <div class="col-lg-8 offset-lg-2">
                        
                        <div class="success-bg-glow"></div>

                        <div class="admin-cta-box text-center p-5" data-aos="zoom-in" data-aos-delay="200" style="border-radius: 30px;">
                            <!-- Success Icon Overlay -->
                            <div class="cta-icon mb-4 mx-auto" style="width: 100px; height: 100px; background: rgba(82, 77, 211, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                                <i class="bi bi-patch-check-fill text-primary" style="font-size: 4rem;"></i>
                            </div>
                            
                            <div class="cta-content">
                                <h2 class="text-white fw-bold mb-2">
                                    <span th:text="${nickname}" class="text-primary">사용자</span>님, 환영합니다!
                                </h2>
                                <p class="text-white-50 fs-5 mb-5">
                                    문답의 새로운 회원이 되신 것을 진심으로 축하드립니다.
                                </p>

                                <div class="mx-auto mb-5" style="width: 40px; height: 4px; background: #524dd3; border-radius: 2px;"></div>

                                <div class="row g-3 justify-content-center">
                                    <div class="col-sm-6 col-md-5">
                                        <a href="/loginView" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm">
                                            <i class="bi bi-box-arrow-in-right me-2"></i>지금 로그인하기
                                        </a>
                                    </div>
                                    <div class="col-sm-6 col-md-5">
                                        <a href="/" class="btn btn-outline-light w-100 py-3 rounded-pill">
                                            <i class="bi bi-house-door me-2"></i>메인 화면으로
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-5 text-center" data-aos="fade-up" data-aos-delay="400">
                            <p class="text-white-50 small">
                                <i class="bi bi-info-circle me-1"></i> 이제 직접 테스트를 만들고 공유할 수 있습니다.
                            </p>
                        </div>

                    </div>
                </div>
                
            </div>
        </section>
    </div>
</body>
</html>
