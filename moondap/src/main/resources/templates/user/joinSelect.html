<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/main_layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문답 - 권한 선택</title>
    
    <link th:href="@{/assets/css/question-page.css}" rel="stylesheet">
    <link th:href="@{/assets/css/admin-form.css}" rel="stylesheet">
    <link th:href="@{/assets/css/selection-card.css}" rel="stylesheet">

</head>

<body layout:fragment="content">
    <main class="main">
        <section class="selection-container">
            <div class="container" data-aos="fade-up">
                
                <div class="section-title text-center mb-5">
                    <h2 class="text-white fw-bold mb-3">회원가입 권한 선택</h2>
                    <p class="text-white-50 fs-5">당신에게 맞는 가입 유형을 선택해주세요.</p>
                </div>

                <!-- 에러 메시지 (인증 실패 시) -->
                <div th:if="${errorMessage}" class="row mb-4">
                    <div class="col-md-6 offset-md-3">
                        <div class="alert alert-danger border-0 rounded-3 text-center py-2 small">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span th:text="${errorMessage}"></span>
                        </div>
                    </div>
                </div>

                <div class="row justify-content-center g-4">
                    <!-- 일반 사용자 카드 -->
                    <div class="col-md-5">
                        <div class="selection-card theme-blue" onclick="selectRole('ROLE_USER')">
                            <div class="icon-box">
                                <i class="bi bi-people-fill"></i>
                            </div>
                            <h3>일반 사용자</h3>
                            <p>재미있는 테스트와 밸런스 게임을 즐기고 나만의 퀴즈를 만들어보세요.</p>
                        </div>
                    </div>

                    <!-- 관리자 카드 -->
                    <div class="col-md-5">
                        <div class="selection-card theme-purple" onclick="openAdminModal()">
                            <div class="icon-box">
                                <i class="bi bi-shield-lock-fill"></i>
                            </div>
                            <h3>콘텐츠 관리자</h3>
                            <p>공식 테스트를 운영하고 플랫폼의 소중한 콘텐츠들을 전문적으로 관리합니다.</p>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <p class="text-white-50">
                        이미 계정이 있으신가요? <a href="/loginView" class="text-primary text-decoration-none fw-bold">로그인하기</a>
                    </p>
                </div>

                <!-- Hidden Form for ROLE_USER -->
                <form action="/joinView" method="POST" id="roleForm" style="display: none;">
                    <input type="hidden" name="role" id="roleInput">
                </form>

            </div>
        </section>

        <!-- 관리자 인증 모달 -->
        <div class="modal fade" id="adminAuthModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content bg-dark text-white border-0 shadow-lg" style="border-radius: 24px; background: #15162c !important;">
                    <div class="modal-body p-5 text-center">
                        <div style="width: 80px; height: 80px; background: rgba(125, 119, 255, 0.1); color: #7d77ff; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 25px;">
                            <i class="bi bi-shield-lock-fill"></i>
                        </div>
                        <h3 class="fw-bold mb-2">관리자 인증</h3>
                        <p class="text-white-50 mb-4 small">부여받은 관리자 인증 코드를 입력해주세요.</p>
                        
                        <form action="/joinView" method="POST">
                            <input type="hidden" name="role" value="ROLE_ADMIN">
                            <div class="mb-4">
                                <input type="text" name="adminKey" class="custom-input text-center py-3" 
                                       placeholder="인증 코드를 입력하세요" required autofocus style="font-size: 1.1rem; letter-spacing: 2px;">
                            </div>
                            <div class="d-grid gap-3">
                                <button type="submit" class="btn btn-primary py-3 fw-bold rounded-pill shadow">
                                    인증 및 가입하기
                                </button>
                                <button type="button" class="btn btn-outline-light rounded-pill py-2" data-bs-dismiss="modal">
                                    취소
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function selectRole(role) {
            document.getElementById('roleInput').value = role;
            document.getElementById('roleForm').submit();
        }

        function openAdminModal() {
            const myModal = new bootstrap.Modal(document.getElementById('adminAuthModal'));
            myModal.show();
        }
    </script>
</body>
</html>
