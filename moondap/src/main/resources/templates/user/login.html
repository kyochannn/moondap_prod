<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 문답</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/assets/css/admin-form.css}" rel="stylesheet">

    <style>
        .login-body {
            background: #05071e;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px !important;
            animation: fadeInUp 0.6s ease-out;
        }

        .login-logo {
            width: 50px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(125, 119, 255, 0.3));
        }

        /* 토스트 알림 스타일 커스텀 */
        #errorToast {
            visibility: hidden; min-width: 280px; background-color: rgba(255, 62, 62, 0.9); color: #fff;
            text-align: center; border-radius: 12px; padding: 14px 24px; position: fixed;
            z-index: 10000; top: 30px; left: 50%; transform: translateX(-50%);
            font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        #errorToast.show { visibility: visible; animation: slideDown 0.4s forwards, slideUp 0.4s 2.6s forwards; }
        
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 30px; opacity: 1; } }
        @keyframes slideUp { from { top: 30px; opacity: 1; } to { top: -100px; opacity: 0; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="login-body">

    <!-- 토스트 알림 영역 -->
    <div id="errorToast">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span id="errorMsg"></span>
    </div>

    <main class="w-100 px-3">
        <div class="item-card-dark login-card mx-auto">
            <div class="text-center mb-4">
                <a href="/">
                    <img src="/assets/img/logo.webp" alt="Moondap Logo" class="login-logo">
                </a>
                <h3 class="text-white fw-bold">Welcome Back</h3>
                <p class="text-white-50 small">세상의 모든 문답을 즐겨보세요</p>
            </div>

            <form action="/loginProc" method="POST" name="loginForm">
                <div class="mb-4">
                    <label class="text-primary small fw-bold mb-2 ms-1">ID</label>
                    <input id="username" type="text" name="username" class="custom-input" 
                           placeholder="아이디를 입력하세요" required autofocus>
                </div>
                <div class="mb-5">
                    <label class="text-primary small fw-bold mb-2 ms-1">Password</label>
                    <input id="password" type="password" name="password" class="custom-input" 
                           placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-primary py-3 fw-bold rounded-pill shadow">
                        로그인
                    </button>
                    <a href="/joinSelectView" class="btn btn-outline-light py-2 rounded-pill small">
                        회원가입
                    </a>
                </div>
            </form>

            <div class="text-center mt-5" style="font-size: 11px;">
                <div class="footer-legal-links mb-2">
                    <a th:href="@{/privacy}" class="text-white-50 text-decoration-none">개인정보처리방침</a>
                    <span class="text-white-50 mx-2">|</span>
                    <a th:href="@{/terms}" class="text-white-50 text-decoration-none">이용약관</a>
                </div>
                <p class="text-white-50 mb-0">© moondap. All Rights Reserved.</p>
            </div>
        </div>
    </main>

	<script th:inline="javascript">
		window.onload = function() {
			const urlParams = new URLSearchParams(window.location.search);
			const error = urlParams.get('error');
			const exception = urlParams.get('exception');

			if (error && exception) {
				const toast = document.getElementById("errorToast");
				const msgSpan = document.getElementById("errorMsg");
				
				msgSpan.innerText = decodeURIComponent(exception);
				toast.className = "show";
				
				setTimeout(() => { 
					toast.className = toast.className.replace("show", ""); 
					// URL에서 파라미터 제거 (깔끔하게)
					window.history.replaceState({}, document.title, "/loginView");
				}, 3000);
			}
		};
	</script>
</body>

</html>
