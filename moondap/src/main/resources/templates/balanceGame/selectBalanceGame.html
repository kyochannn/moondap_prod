<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{/layout/main_layout}"
      >
<!-- layout:decorate="~{/레이아웃 경로/레이아웃 파일명}" -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트로 만나는 또 다른 나, 문답</title>
    <style type="text/css">
		.bg-unselected {
		    background-color: #383838 !important;
		    background-image: none !important;
		}
		
		/* 링크 복사 토스트 스타일 */
		#copyToast {
		    visibility: hidden;
		    min-width: 200px;
		    background-color: #ffffff;
		    color: #000000;
		    text-align: center;
		    border-radius: 10px;
		    padding: 12px 24px;
		    position: fixed;
		    z-index: 10000;
		    bottom: 50px;
		    left: 50%;
		    transform: translateX(-50%);
		    font-weight: bold;
		    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
		}
		
		#copyToast.show {
		    visibility: visible;
		    -webkit-animation: fadein 0.5s, fadeout 0.5s 2.5s;
		    animation: fadein 0.5s, fadeout 0.5s 2.5s;
		}
		
		@-webkit-keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 50px; opacity: 1; } }
		@keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 50px; opacity: 1; } }
		@-webkit-keyframes fadeout { from { bottom: 50px; opacity: 1; } to { bottom: 0; opacity: 0; } }
		@keyframes fadeout { from { bottom: 50px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style> 
    <script th:inline="javascript"> 
        // 서버에서 넘겨준 현재 게임 ID
        const gameId = /*[[${balanceGame.id}]]*/ 'default';
        const spicyFilter = /*[[${balanceGame.isSpicy ? 1 : 0}]]*/ 0;
        const category = /*[[${balanceGame.category}]]*/ 'all';
        const isAnonymous = /*[[${isAnonymous}]]*/ false;
        const currentUserId = /*[[${currentUserId}]]*/ '';
        const isAdmin = /*[[${#authorization.expression('hasAuthority("ROLE_ADMIN")')}]]*/ false;
        
    	// 재투표 제한 시간 설정 : 약 20초
    	const VOTE_LIMIT_MIN = 1/4 * 60000 ;
    	// 사용자 nickname
       	let nickname = '';
    	
    	// 좋아요 처리 중인 댓글 번호를 추적 (중복 클릭 방지)
    	const processingLikeComments = {};
    	
    
    	document.addEventListener('DOMContentLoaded', function() {
			
    		// 화면이 처음 로드될 때 최상단으로 이동하도록 설정
    		if ('scrollRestoration' in history) {
    		    history.scrollRestoration = 'manual';
    		}
    		window.scrollTo(0, 0);
    		
	        if (isAlreadyVoted()) {
	    		// 투표를 진행한 이력이 있다면
	            // 선택 창 클릭 금지
	            $('.option1Content, .option2Content').css('pointer-events', 'none'); 
	            
	            // 사용자가 이전에 뭘 했는지 정보 가져오기
	            const votedGames = JSON.parse(localStorage.getItem('moondap_voted_games') || '{}');
	            const side = votedGames[gameId].side;
		        
	            // 예전 투표 결과 디스플레이
    			applyVoteResultStyle(side);
    			
    			// 다시하기 버튼 활성화
    			$('#resetVoteBtn').fadeIn();
    			
    			// 결과 퍼센트 바 활성화
    			$('#balance-game-progressbar-container').fadeIn();
    			
    			// 채팅창 활성화
    			$('#balance-game-chat-container').fadeIn();
    			
    			// 댓글 그리기
    	        selectBalanceGameComment();
    			
	        } else {
	        	
	        	// 투표를 진행한 이력이 없다면
	        	// 다시하기 버튼 비활성화
	        	$('#resetVoteBtn').hide();
	        	
	        	// 결과 퍼센트 바 비활성화
	        	$('#balance-game-progressbar-container').hide();
	        	
    			// 채팅창 비활성화
    			$('#balance-game-chat-container').hide();
	        }
	        
			// 엔터키 지원
			$('#chat-content').on('keypress', function(e) {
			    if (e.which == 13) {
			    	insertBalanceGameComment();
			    }
			});
			
			$('#userNicknameInput').on('keypress', function(e) {
			    if (e.which == 13) {
			    	saveNickname();
			    }
			});
	        
	    });
    	
		// [2] 투표 여부 확인
		function isAlreadyVoted() {
			
		    const votedGames = JSON.parse(localStorage.getItem('moondap_voted_games') || '{}');
		    const voteData = votedGames[gameId];
		    console.log(voteData);
		    
		    // a. localstorage에 밸런스 게임 정보가 없을 때
		    if (!voteData) return false;
		    
		    return true;
		}
		
		function applyVoteResultStyle(side) {
		    if (side === 'left') {
		    	// [카드 스타일]
		        // 선택된 항목
		        $('.option1Content').css('transition', 'transform 0.3s ease');
		        $('.option1Content').css('border', '6px solid #3876f2');
		        
		        // 선택되지 않은 항목
		        $('.option2Content').css('transform', 'scale(0.9)');
		        $('.option2Content').css('opacity', '0.7');
		        
		        // [프로그레스 바 스타일]
		        $('.bg-balance-left').removeClass('bg-unselected');
		        $('.bg-balance-right').addClass('bg-unselected');
		    } else {
		        // [카드 스타일]
		        // 선택된 항목
		        $('.option1Content').css('transition', 'transform 0.3s ease');
		        $('.option2Content').css('border', '6px solid #de66e9');
		        
		        // 선택되지 않은 항목
		        $('.option1Content').css('transform', 'scale(0.9)');
		        $('.option1Content').css('opacity', '0.7');
		        
		     	// [프로그레스 바 스타일]
		        $('.bg-balance-right').removeClass('bg-unselected');
		        $('.bg-balance-left').addClass('bg-unselected');
		    }
	        $('.option1Content').css('pointer-events', 'none');
	        $('.option2Content').css('pointer-events', 'none');
		}
    
		function selectOption(element, side) {
			
		    $.ajax({
		        url: '/balanceGame/vote',
		        type: 'POST',
		        contentType: 'application/json',
		        data: JSON.stringify({ 
		            id: /*[[${balanceGame.id}]]*/ 'default', 
		            side: side 
		        }),
		        success: function(data) {
		            // 1. UI 고정
		            element.classList.add('selected');
		            
					// 2. side에 따라 클래스 부여
				    applyVoteResultStyle(side);
					
		            // 3. 결과 반영 (데이터 받아와서 처리)
		            $('.total-count-text').text(data.totalCount);
		            
					$('.option-bar-left').css('width', data.option1Percent + '%');
		            $('.bg-balance-left').text(data.option1Percent + '% (' + data.option1Count + '명)');
		            
					$('.option-bar-right').css('width', data.option2Percent + '%');
		            $('.bg-balance-right').text(data.option2Percent + '% (' + data.option2Count + '명)');

		            // 4. 로컬 스토리지에 사용자의 밸런스 게임 정보 저장
		            saveVoteLocalStorage(side);
		            
		            // 5. 다시하기 버튼 활성화
					$('#resetVoteBtn').fadeIn();
		            
					// 6. 결과 퍼센트 바 활성화
	    			$('#balance-game-progressbar-container').show();
					
	    			// 7. 투표 성공 시 채팅창과 결과 바를 부드럽게 보여줌
					$('#balance-game-chat-container').fadeIn(500, function() {
					    // 1. 첫 번째 댓글 요소 선택 (renderCommentList가 실행된 후여야 함)
					    const $firstComment = $('.comment-list > div').first();
					
					    if ($firstComment.length > 0) {
					        const scrollPos = $firstComment.offset().top + $firstComment.outerHeight() - $(window).height();
					        $('html, body').animate({
					            scrollTop: scrollPos
					        }, 0);
					    }
					});
	                
				    // 8. 폭죽 효과 실행
				    const rect = element.getBoundingClientRect();
    
				    const centerX = (rect.left + rect.width / 2) / window.innerWidth;
				    const centerY = (rect.top + rect.height / 2) / window.innerHeight;
				    
				    confetti({
		                particleCount: 150,
		                spread: 70,
		                origin: { x: centerX, y: centerY },
		                colors: ['#524FD0', '#ffffff', '#3876f2'],
		                zIndex: 9999
		            });

                    // 9. 댓글 데이터 가져오기
	                selectBalanceGameComment();
		        },
		        error: function(xhr, status, error) {
		        	console.log("Status: " + status);
		            console.log("Error: " + error);
		            console.log("ResponseText: " + xhr.responseText);
		            alert("투표 중 오류가 발생했습니다.");
		        }
		    });
		}
		
		// [1] 투표 저장 (LocalStorage 활용)
		function saveVoteLocalStorage(side) {
		    // 1. 기존 데이터 가져오기 (없으면 빈 객체)
		    const votedGames = JSON.parse(localStorage.getItem('moondap_voted_games') || '{}');
		    
		    // 2. 새 데이터 추가
		    votedGames[gameId] = {
		        side: side,
		        time: new Date().getTime()
		    };
		    
		    // 3. 다시 저장
		    localStorage.setItem('moondap_voted_games', JSON.stringify(votedGames));
		}

    	// 재투표 기능
    	function resetVote() {
    		
    		if (isAlreadyVoted()) {
    		    const votedGames = JSON.parse(localStorage.getItem('moondap_voted_games') || '{}');
    		    const voteData = votedGames[gameId];
	    		
		    	const now = new Date().getTime();
		    	const limitMs = VOTE_LIMIT_MIN;
		    	
		    	const remainMs = limitMs - (now - voteData.time);

		    	const seconds = Math.floor((remainMs % 60000) / 1000);
		    	 
		    	if (remainMs > 0) {
			    	alert(seconds + "초 뒤 다시할 수 있습니다.");
		    	} else {	
				 	delete votedGames[gameId];
	 		        localStorage.setItem('moondap_voted_games', JSON.stringify(votedGames));
			        
				 	location.reload();
				 	
	 		        return;
		    	}

    		} else {
			 	console.log("현재는 테스트 가능함.");
			 	location.reload();
    		}
    	}
    	
    	// 댓글 조회
    	function selectBalanceGameComment() {
    		
	    	$.ajax({
		        url: '/balanceGame/selectBalanceGameComment',
		        type: 'POST',
		        contentType: 'application/json',
		        data: JSON.stringify({ 
		            id: /*[[${balanceGame.id}]]*/ 'default'
		        }),
		        success: function(commentList) {
		        	renderCommentList(commentList);
		        },
		        error: function(xhr, status, error) {
		        	console.log("Status: " + status);
		            console.log("Error: " + error);
		            console.log("ResponseText: " + xhr.responseText);
		            alert("댓글 조회 중 오류가 발생했습니다.");
		        }
		    });
    	}
    	
    	// 댓글 삭제 (관리자용)
    	function deleteComment(commentNo) {
    	    if (!confirm("이 댓글을 삭제하시겠습니까?")) return;
    	    
    	    $.ajax({
    	        url: '/balanceGame/deleteBalanceGameComment',
    	        type: 'POST',
    	        contentType: 'application/json',
    	        data: JSON.stringify({ 
    	            no: commentNo
    	        }),
    	        success: function(res) {
    	            if (res.flag === 'success') {
    	                // 리스트 새로고침
    	                selectBalanceGameComment();
    	            } else {
    	                alert(res.message || "삭제 실패했습니다.");
    	            }
    	        },
    	        error: function() {
    	            alert("삭제 처리 중 오류가 발생했습니다.");
    	        }
    	    });
    	}
    	
    	// 댓글 달기
		function insertBalanceGameComment() {
			if (isAlreadyVoted()) {
				
				let content = $('#chat-content').val();
				
			    const votedGames = JSON.parse(localStorage.getItem('moondap_voted_games') || '{}');
			    const voteData = votedGames[gameId];
				let voteSide = voteData.side;
				
	            // 1. 유효성 검사 (50자 이내 입력 가능)
		        if (!content || content.trim() === "") {
		            alert("메시지를 입력해주세요.");
		            return;
		        }
		        if (content.length > 50) {
		            alert("50자 이내로 입력 가능합니다.");
		            return;
		        }
	    			
		        // 2. nickname - session에 저장되어있는지 확인
		        if (isNicknameSet()) {
		            // 3. 서버로 요청
				    $.ajax({
				        url: '/balanceGame/insertBalanceGameComment',
				        type: 'POST',
				        contentType: 'application/json',
				        data: JSON.stringify({ 
				            id: /*[[${balanceGame.id}]]*/ 'default', 
				            nickname: nickname,
				            side: voteSide,
				            content: content
				        }),
				        success: function(commentList) {
				        	if (commentList && commentList.length > 0) {
					        	renderCommentList(commentList);
								
					            // 4. 댓글 작성 시 리스트 하단으로 스크롤 이동
					            const $commentList = $('.comment-list');
					            $('html, body').stop().animate({
					                scrollTop: $commentList.offset().top + $commentList.outerHeight() - $(window).height() + 100
					            }, 500);
					            
					        	$('#chat-content').val('');
					            $('#chat-content').focus();
				        	} else {
					            alert("댓글 입력 중 오류가 발생했습니다.");
					            return;
				        	}
				        },
				        error: function(xhr, status, error) {
				        	console.log("Status: " + status);
				            console.log("Error: " + error);
				            console.log("ResponseText: " + xhr.responseText);
				            const serverMsg = xhr.responseJSON && xhr.responseJSON.message;
				            alert(serverMsg || "댓글 입력 중 오류가 발생했습니다.");
				        }
				    });
		        } else {
		            // 닉네임이 없는 경우 -> 팝업(모달) 띄우기
		            const nicknameModal = new bootstrap.Modal(document.getElementById('nicknameModal'));
		            nicknameModal.show();
		            $('#nicknameModal').on('shown.bs.modal', function () {
		                $('#userNicknameInput').trigger('focus');
		            });
		        }
		        
			} else {
				alert("선택 후 댓글을 달 수 있습니다.");
			}
		}
		
    	// nickname 체크 함수
		function isNicknameSet() {
		    if (!isAnonymous) {
		        nickname = currentUserId;
		        return true;
		    }
		    nickname = localStorage.getItem('moondap_comment_nickname');
		    return (nickname !== null && nickname.trim() !== "");
		}
    	
    	// nickname 저장 함수
    	function saveNickname() {
		    const nicknameInput = $('#userNicknameInput').val().trim();
		    
		    if (nicknameInput === "") {
		        alert("닉네임을 입력해 주세요!");
		        return;
		    }
		    
		    if (nicknameInput.length >= 8) {		    	
		        alert("닉네임을 8자 이내로 설정해 주세요.");
		        return;
		    }
		
		    // 로컬 스토리지에 저장
		    localStorage.setItem('moondap_comment_nickname', nicknameInput);
		    
		    // 모달 닫기
		    const nicknameModal = bootstrap.Modal.getInstance(document.getElementById('nicknameModal'));
		    nicknameModal.hide();
		    
		    // 댓글 추가
		    insertBalanceGameComment();
		}
    	
    	// nickname 팝업창 취소 버튼 시
    	function cancelNickname() {
    	    $('#userNicknameInput').val('');
    	    
    	    const nicknameModalEl = document.getElementById('nicknameModal');
    	    const modalInstance = bootstrap.Modal.getInstance(nicknameModalEl);
    	    
    	    if (modalInstance) {
    	        modalInstance.hide();
    	    }
    	    
    	    $('#chat-content').focus();
    	}
    	
    	// HTML 이스케이프 함수 (XSS 방지)
    	function escapeHtml(text) {
    	    if (!text) return "";
    	    return String(text)
    	        .replace(/&/g, "&amp;")
    	        .replace(/</g, "&lt;")
    	        .replace(/>/g, "&gt;")
    	        .replace(/"/g, "&quot;")
    	        .replace(/'/g, "&#039;");
    	}
    	
    	// 댓글 그리기
		function renderCommentList(commentList) {
		    const $commentContainer = $('.comment-list');
		    $commentContainer.empty();

		    const allLikedData = JSON.parse(localStorage.getItem('moondap_liked_comments') || '{}');
		    const likedComments = allLikedData[gameId] || [];
		    
		    if (!commentList || commentList.length === 0) {
		        const votedGames = JSON.parse(localStorage.getItem('moondap_voted_games') || '{}');
		        const side = votedGames[gameId] ? votedGames[gameId].side : 'left';
		        
		        let emptyMsg = `
		            <div class="d-flex flex-column ${side === 'left' ? 'align-items-start' : 'align-items-end'} mb-3" data-aos="fade-up">
		                <div class="p-3"
		                    style="background: ${side === 'left' ? '#1e213a' : '#251b3a'}; 
		                           border: 1px solid ${side === 'left' ? '#3876f2' : '#de66e9'}; 
		                           border-radius: ${side === 'left' ? '2px 15px 15px 15px' : '15px 2px 15px 15px'}; 
		                           max-width: 80%; text-align: left;">
		                    <p class="mb-0" style="color: #e9ecef; font-size: 0.95rem;">첫 번째 댓글을 남겨보세요!</p>
		                </div>
		            </div>`;
		        $commentContainer.append(emptyMsg);
		        return;
		    }

		    commentList.forEach(comment => {
		        const safeNickname = escapeHtml(comment.nickname);
		        const safeContent = escapeHtml(comment.content);
		        const isLiked = likedComments.includes(Number(comment.no));
		        const heartClass = isLiked ? 'bi-heart-fill text-danger' : 'bi-heart text-secondary';
		        const countColor = isLiked ? '#ef4444' : '#6c757d';
		        
		        // 로그인한 사용자의 경우 체크 표시 추가
		        const checkmark = comment.userId ? '<i class="bi bi-patch-check-fill user-verified-check" title="인증된 사용자"></i>' : '';
		        
		        const deleteBtn = isAdmin ? `<i class="bi bi-x-circle-fill admin-delete-btn" onclick="deleteComment(${comment.no})" title="댓글 삭제"></i>` : '';
		        
		        let commentHtml = '';
		        if (comment.selectedSide === 'left') {
		            commentHtml = `
		                <div class="d-flex flex-column mb-1">
		                    <div class="d-flex flex-row align-items-center">
		                        <div class="d-flex flex-column flex-grow-1">
		                            <div class="d-flex align-items-center mb-1 ms-1">
		                                <span style="color: #3876f2; font-weight: bold; font-size: 0.8rem;">${safeNickname}${checkmark}</span>
		                            </div>
		                            <div class="d-flex align-items-center">
			                            <div class="comment-bubble-left">
			                                <p class="mb-0" style="color: #e9ecef; font-size: 0.95rem; white-space: pre-wrap;">${safeContent}</p>
			                            </div>
		                                <div class="d-flex align-items-center ms-2 gap-1 like-wrapper" style="cursor: pointer; min-width: 20px; line-height: 1;">
		                                    <i class="bi ${heartClass} fs-6 like-icon" onclick="toggleLike(this, ${comment.no})"></i>
		                                    <span class="like-count" style="font-size: 0.75rem; color: ${countColor};" onclick="toggleLike(this, ${comment.no})">${comment.likeCount || 0}</span>
		                                    ${deleteBtn}
		                                </div>
		                            </div>
		                            <small class="mt-1 ms-1" style="color: #6c757d; font-size: 0.7rem;">${timeSince(comment.createdAt)}</small>
		                        </div>
		                    </div>
		                </div>`;
		        } else {
		            commentHtml = `
		                <div class="d-flex flex-column mb-1">
		            		<div class="d-flex flex-column" style="max-width: 100%;">
		            			<div class="d-flex flex-column flex-grow-1">
		                            <div class="d-flex align-items-center justify-content-end mb-1 me-1">
		                                <span style="color: #de66e9; font-weight: bold; font-size: 0.8rem;">${safeNickname}${checkmark}</span>
		                            </div>
		                            <div class="d-flex align-items-center justify-content-end">
		                                <div class="d-flex align-items-center me-2 gap-1 like-wrapper" style="cursor: pointer; min-width: 20px; line-height:1;">
		                                    ${deleteBtn}
		                                    <i class="bi ${heartClass} fs-6 like-icon" onclick="toggleLike(this, ${comment.no})"></i>
		                                    <span class="like-count" style="font-size: 0.75rem; color: ${countColor};" onclick="toggleLike(this, ${comment.no})">${comment.likeCount || 0}</span>
		                                </div>
		                                <div class="comment-bubble-right">
		                                   <p class="mb-0" style="color: #e9ecef; font-size: 0.95rem; white-space: pre-wrap;">${safeContent}</p>
		                               </div>
		                            </div>
		                            <small class="mt-1 me-1 text-end" style="color: #6c757d; font-size: 0.7rem;">${timeSince(comment.createdAt)}</small>
		                        </div>
		                    </div>
		                </div>`;
		        }
		        $commentContainer.append(commentHtml);
		    });

		    if (typeof AOS !== 'undefined') {
		        AOS.refresh();
		    }
		}

		/**
		 * 좋아요 토글 함수
		 */
		function toggleLike(element, commentNo) {
			if (!isAlreadyVoted()) {
				alert("선택 후 좋아요를 누를 수 있습니다.");
				return;
			}
			
			const targetNo = Number(commentNo);
			
			// 1. 이미 처리 중인 경우 리턴 (연타 방지)
			if (processingLikeComments[targetNo]) return;

			const $icon = $(element).find('.like-icon');
			const $countSpan = $(element).find('.like-count');
			const currentCount = parseInt($countSpan.text());
			
			let allLikedData = JSON.parse(localStorage.getItem('moondap_liked_comments') || '{}');
			let currentLikedList = allLikedData[gameId] || [];
			const isAlreadyLiked = currentLikedList.includes(targetNo);
			let setting = '';

			// 처리 시작 표시
			processingLikeComments[targetNo] = true;

			// 2. UI 및 로컬 스토리지 선반영 (Optimistic Update)
			if (!isAlreadyLiked) {
				currentLikedList.push(targetNo);
				setting = 'UP';
				$icon.removeClass('bi-heart text-secondary').addClass('bi-heart-fill text-danger');
				$countSpan.text(currentCount + 1).css('color', '#ef4444');
			} else {
				currentLikedList = currentLikedList.filter(no => no !== targetNo);
				setting = 'DOWN';
				$icon.removeClass('bi-heart-fill text-danger').addClass('bi-heart text-secondary');
				$countSpan.text(currentCount - 1).css('color', '#6c757d');
			}
			
			// 로컬 스토리지 즉시 업데이트 (연타 대비)
			allLikedData[gameId] = currentLikedList;
			localStorage.setItem('moondap_liked_comments', JSON.stringify(allLikedData));

			$.ajax({
				url: '/balanceGame/updateBalanceGameCommentLikeCount',
				type: 'POST',
				contentType: 'application/json',
				data: JSON.stringify({ 
					no: commentNo,
					id: gameId,
					setting: setting
				}),
				success: function(commentList) {
					// 성공 시 리스트 동기화
					renderCommentList(commentList);
				},
				error: function(xhr, status, error) {
					// 3. 에러 시 UI 및 로컬 스토리지 원복 (Rollback)
					let rollbackData = JSON.parse(localStorage.getItem('moondap_liked_comments') || '{}');
					let rollbackList = rollbackData[gameId] || [];
					
					if (!isAlreadyLiked) {
						// UP 시도했다가 실패했으므로 다시 제거
						rollbackList = rollbackList.filter(no => no !== targetNo);
						$icon.removeClass('bi-heart-fill text-danger').addClass('bi-heart text-secondary');
						$countSpan.text(currentCount).css('color', '#6c757d');
					} else {
						// DOWN 시도했다가 실패했으므로 다시 추가
						rollbackList.push(targetNo);
						$icon.removeClass('bi-heart text-secondary').addClass('bi-heart-fill text-danger');
						$countSpan.text(currentCount).css('color', '#ef4444');
					}
					
					rollbackData[gameId] = rollbackList;
					localStorage.setItem('moondap_liked_comments', JSON.stringify(rollbackData));
					
					console.log("Error: " + error);
					alert("좋아요 처리 중 오류가 발생했습니다.");
				},
				complete: function() {
					// 처리 완료 후 잠금 해제
					delete processingLikeComments[targetNo];
				}
			});
		}

		/**
		 * 시간을 '방금 전', 'n분 전' 형태로 변환하는 유틸 함수
		 */
		function timeSince(date) {
		    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
		    let interval = seconds / 31536000;

		    if (interval > 1) return Math.floor(interval) + "년 전";
		    interval = seconds / 2592000;
		    if (interval > 1) return Math.floor(interval) + "달 전";
		    interval = seconds / 86400;
		    if (interval > 1) return Math.floor(interval) + "일 전";
		    interval = seconds / 3600;
		    if (interval > 1) return Math.floor(interval) + "시간 전";
		    interval = seconds / 60;
		    if (interval > 1) return Math.floor(interval) + "분 전";
		    return "방금 전";
		}
    	
		function goToNextOrPrevGame(direction) {
			
			// 세션에 저장되어있는 검색 조건
	    	let listCategory = localStorage.getItem('moondap_balancegame_category');
	    	let listSpicyFilter = localStorage.getItem('moondap_balancegame_spicyfilter');
	    	
	    	// null 체크 및 기본값 설정
	    	if (!listCategory || listCategory === 'null') listCategory = 'all';
	    	if (!listSpicyFilter || listSpicyFilter === 'null') listSpicyFilter = '1';
	    	
		    $.ajax({
		        url: '/balanceGame/nextOrPrevBalanceGameIdSelect',
		        type: 'POST',
		        contentType: 'application/json',
		        data: JSON.stringify({ 
		            id: /*[[${balanceGame.id}]]*/ 'default',
		            direction: direction,
		            spicyFilter: listSpicyFilter,
		            category: listCategory
		        }),
		        success: function(gameId) {
		            if (gameId) {
		                location.href = '/balanceGame/selectBalanceGameView?id=' + gameId + '&spicyFilter=' + listSpicyFilter + '&category=' + listCategory;
		            }
		        },
		        error: function() {
		            alert("질문을 가져오는 데 실패했습니다.");
		        }
		    });
		}
		
		function testComment() {
			if (isAlreadyVoted()) {
			    const $balanceGameChatContainer = $('#balance-game-chat-container');
			    const $btn = $('.comment-view-hide-text');
	
			    $balanceGameChatContainer.slideToggle(300, function() {
			        if ($balanceGameChatContainer.is(':visible')) {
			            $btn.html('댓글 숨기기 <i class="bi bi-chevron-up"></i>');
			        } else {
			            $btn.html('댓글 보기 <i class="bi bi-chevron-down"></i>');
			        }
			    });
			} else {
				alert("투표 진행 후 댓글을 볼 수 있습니다.");
			}
		}
		
		function updateBalanceGameView() {
			location.href = '/balanceGame/updateBalanceGameView?id=' + gameId;
		}
		
		function balanceGameListView() {
			location.href = '/balanceGame/selectBalanceGameListView';
		}
		
		function shareKakao() {
		  const shareUrl = window.location.origin + '/balanceGame/select?userNo=' + /*[[${balanceGame.id}]]*/ 'default';
		  const title = /*[[${balanceGame.title}]]*/ 'title';
		  const description = '어떤 선택을 했을까요? 지금 바로 확인해 보세요!';

		  shareKakaoCommon({
		    title: title,
		    description: description,
		    imageUrl: window.location.origin + '/assets/img/logo.webp',
		    shareUrl: shareUrl,
		    buttonTitle: '결과 보러가기'
		  });
		}
		
		function copyLink() {
		    copyLinkCommon(null, function() {
		        const toast = document.getElementById("copyToast");
		        toast.className = "show";
		        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
		    });
		}
    </script>
</head>

<body layout:fragment="content">
    <!-- 복사 알림 토스트 -->
    <div id="copyToast"><i class="bi bi-check-circle-fill me-2"></i>링크가 복사되었습니다!</div>
    
    <div class="container">

		<!-- Balance Game Section -->
		<section id="team" class="team section py-1 z-1">

							data-aos-delay="100">
							<div class="mt-3">

							</div>
							
							<!-- Share Section -->
							<section id="share-container" class="py-1 my-1 position-relative z-2 overflow-visible">
								<div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
									<div>
									<button type="button"
										class="btn btn-outline-light d px-3 bord-radius-20"
										onclick="balanceGameListView()" >
										<i class="bi bi-list-task"></i> 리스트로 이동
									</button>
									<button type="button"
										class="btn btn-outline-light d px-3 bord-radius-20"
										onclick="updateBalanceGameView()" 
										th:if="${(!isAnonymous and currentUserId == balanceGame.userId) or #authorization.expression('hasRole(''ADMIN'')')}">
										<i class="bi bi-pencil-fill"></i> 편집하기
									</button>
									</div>
									<div class="btn-group dropdown">
										<button type="button"
											class="btn btn-outline-light d px-3 bord-radius-20 dropdown-toggle"
											data-bs-toggle="dropdown" aria-expanded="false">
											<i class="bi bi-share-fill"></i>
										</button>
										<ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark text-nowrap">
											<li>
												<div class="form-check form-switch custom-switch d-flex justify-content-between align-items-center px-2"

													<label class="form-check-label text-white small mb-0"

														<i class="bi bi-chat-fill"></i> 카카오톡 공유</label>
												</div>
											</li>
											<li>
												<div class="form-check form-switch custom-switch d-flex justify-content-between align-items-center px-2"

													style="min-height: 32px; cursor: pointer;">
													<label class="form-check-label text-white small mb-0"
														for="newQuestionOnly" style="cursor: pointer;">
														<i class="bi bi-clipboard-fill"></i> 링크 복사</label>
												</div>
											</li>
										</ul>
									</div>
								</div>
							</section>
							
							<div class="row leadership-slider py-0">
								
								<div class="col-6 pe-1">
								    <div class="leader-card selection-card option1Content" onclick="selectOption(this, 'left')">
								        <div class="leader-image">
											<img th:src="@{'/uploads/' + ${balanceGame.option1ImagePath}}" alt="선택지1">
								            <div class="overlay"></div> 
								        </div>
								        <div class="leader-info">
								            <h5 th:text="${balanceGame.option1Text}">선택지 1</h5>
								        </div>
								    </div>
								</div>
								
								<div class="col-6 ps-1">
								    <div class="leader-card selection-card option2Content" onclick="selectOption(this, 'right')">
								        <div class="leader-image">
											<img th:src="@{'/uploads/' + ${balanceGame.option2ImagePath}}" alt="선택지2">
								            <div class="overlay"></div> 
								        </div>
								        <div class="leader-info">
								            <h5 th:text="${balanceGame.option2Text}">선택지 2</h5>
								        </div>
								    </div>
								</div>

							</div>
						</div>
					</div>
				</div>

			</div>

		</section>
		<!-- /Balance Game Section -->

		<!-- Share Section -->
		<section id="share-container" class="py-1 my-1 position-relative z-2 overflow-visible">
			<div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
				<button type="button"
					class="btn btn-outline-light d px-3 bord-radius-20"
					onclick="goToNextOrPrevGame('PREV')">

				</button>

				<button type="button"

				<button type="button"

					onclick="goToNextOrPrevGame('NEXT')">
					다음 질문 <i class="bi bi-arrow-right-circle-fill"></i>

		</section>

				<div class="progress option-bar-left" role="progressbar"
					th:style="'width: ' + ${balanceGame.option1Percent} + '%; height: 35px;'">
