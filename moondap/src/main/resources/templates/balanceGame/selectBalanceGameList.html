<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{/layout/main_layout}">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>세상의 모든 테스트, 문답</title>
	<style>
	</style>
	<script>
		// 전체 List에 적용되는 category
		let listCategory;
		let listSpicyFilter;

		document.addEventListener('DOMContentLoaded', function () {
			listCategory = $('#category').val();
			listSpicyFilter = $('#spicyFilter').is(':checked') ? 1 : 0;

			searchBalanceGameList();
			localStorage.setItem('moondap_balancegame_category', listCategory);
			localStorage.setItem('moondap_balancegame_spicyfilter', listSpicyFilter);

			// console.log("리스트 최초 카테고리: ", listCategory);
			// console.log("리스트 최초 매운맛 필터: ", listSpicyFilter);

			$('#category').on('change', function () {
				searchBalanceGameList();
				listCategory = $('#category').val();
				localStorage.setItem('moondap_balancegame_category', listCategory);
				// console.log("리스트 선택된 카테고리: ", listCategory);
				// console.log("리스트 선택된 매운맛 필터: ", listSpicyFilter);
			});

			$('#spicyFilter').on('change', function () {
				searchBalanceGameList();
				listSpicyFilter = $('#spicyFilter').is(':checked') ? 1 : 0;
				localStorage.setItem('moondap_balancegame_spicyfilter', listSpicyFilter);
				// console.log("리스트 선택된 카테고리: ", listCategory);
				// console.log("리스트 선택된 매운맛 필터: ", listSpicyFilter);
			});

		});

		function searchBalanceGameList() {

			let spicyFilter = $('#spicyFilter').is(':checked') === true ? 1 : 0;
			let category = $('#category').val().trim();

			$.ajax({
				url: '/balanceGame/selectBalanceGameList',
				type: 'POST',
				dataType: 'json',
				contentType: 'application/json',
				data: JSON.stringify({
					spicyFilter: spicyFilter,
					category: category
				}),
				success: function (balanceGameList) {
					if (balanceGameList && balanceGameList.length > 0) {
						renderBalanceGameListList(balanceGameList, true);
					} else {
						;
						renderBalanceGameListList(balanceGameList, false);
						return;
					}
				},
				error: function (xhr, status, error) {
					console.log("Status: " + status);
					console.log("Error: " + error);
					console.log("ResponseText: " + xhr.responseText);
					alert("밸런스 게임 조회 중 오류가 발생했습니다.");
				}
			});
		}

		function renderBalanceGameListList(balanceGameList, setting) {
			const $balanceGameListContainer = $('.balanceGame-list');
			$balanceGameListContainer.empty();

			// 밸런스 게임이 하나도 없을 경우 처리
			if (setting === false) {
				$balanceGameListContainer.append(`
        			<div class="d-flex flex-column align-items-center justify-content-center py-3 text-center" data-aos="fade-up">
	        		    <div class="mb-4">
	        		        <i class="bi bi-search opacity-25 text-white-75" style="font-size: 5rem;"></i>
	        		    </div>
	        		    
	        		    <h3 class="fw-bold mb-2 text-light">조건에 맞는 게임이 없어요!</h3>
	        		    
	        		    <p class="mb-4 text-white-50">
	        		        선택하신 카테고리나 매운맛 필터를 <br>
	        		        바꿔보시는 건 어떨까요?
	        		    </p>
	        		</div>
	                `);

				return;
			}

			balanceGameList.forEach(balanceGame => {

				let id = balanceGame.id;
				let totalCnt = balanceGame.totalCount;
				let commnetCnt = balanceGame.commentCnt;
				let category = balanceGame.category;
				let spicyFilter = balanceGame.isSpicy === true ? 1 : 0;
				let teg = '';
				let link = '/balanceGame/selectBalanceGameView?id=' + id + '&spicyFilter=' + listSpicyFilter + '&category=' + listCategory;

				if (category === 'love') {
					category = '연애/결혼';
					teg = '<i class="bi bi-heart-fill"></i>';
				} else if (category === 'food') {
					category = '음식/맛집';
					teg = '<i class="bi bi-fork-knife"></i>';
				} else if (category === 'work') {
					category = '직장/진로';
					teg = '<i class="bi bi-person-workspace"></i>';
				} else if (category === 'daily') {
					category = '일상/생활';
					teg = '<i class="bi bi-tree-fill"></i>';
				} else if (category === 'money') {
					category = '경제/자산';
					teg = '<i class="bi bi-cash-coin"></i>';
				} else if (category === 'hobby') {
					category = '취미/게임';
					teg = '<i class="bi bi-joystick"></i>';
				} else if (category === 'school') {
					category = '학교/공부';
					teg = '<i class="bi bi-backpack2-fill"></i>';
				} else if (category === 'travel') {
					category = '여행/휴식';
					teg = '<i class="bi bi-airplane-fill"></i>';
				} else if (category === 'fashion') {
					category = '패션/뷰티';
					teg = '<i class="bi bi-signpost-fill"></i>';
				} else if (category === 'fantasy') {
					category = '판타지/IF';
					teg = '<i class="bi bi-signpost-fill"></i>';
				} else if (category === 'adult') {
					category = '매운맛/19금';
					teg = '<i class="bi bi-gender-ambiguous"></i>';
				} else if (category === 'etc') {
					category = '기타/랜덤';
					teg = '<i class="bi bi-stack"></i>';
				}

				let spicyFilterIcon;

				if (spicyFilter) {
					spicyFilterIcon = '🌶️';
				} else {
					spicyFilterIcon = '';
				}

				let balanceGameListHtml = `
	        		<a href="${link}">
		        		<div class="method-card mb-3" data-aos="zoom-in" data-aos-delay="300">
		                  	<div class="card-icon">
		                    	` + teg + `
		                  	</div>
		                  	<div class="card-content">
		                    	<h4 class="mt-1"> ` + spicyFilterIcon + ` ${balanceGame.title}</h4>
								<p class="fw-light"><i class="bi bi-tags-fill"></i> ` + category + `</p>
		                    	<span class="response-time">
									<span class="me-2">
										<i class="bi bi-caret-right-fill"></i> ` + totalCnt + ` 
									</span>
									<span class="me-2">
										<i class="bi bi-chat-fill"></i> ` + commnetCnt + `
									</span>
								</span>
		                  	</div>
		                </div>
		        	</a>
	                `;
				$balanceGameListContainer.append(balanceGameListHtml);
			});

			if (typeof AOS !== 'undefined') {
				AOS.refresh();
			}
		}

		function startBalanceGame() {
			// 세션에 저장되어있는 검색 조건
			let listCategory = localStorage.getItem('moondap_balancegame_category');
			let listSpicyFilter = localStorage.getItem('moondap_balancegame_spicyfilter');

			location.href = '/balanceGame/selectBalanceGameView?spicyFilter=' + listSpicyFilter + '&category=' + listCategory;
		}
	</script>
</head>

<body layout:fragment="content">
	<div class="container">
		<!-- Contact Section -->
		<section id="contact" class="contact section py-0" style="background: none;">

			<div class="container" data-aos="fade-up" data-aos-delay="100">
				<div class="row align-items-center">

					<div class="col-12" data-aos="fade-left" data-aos-delay="200">
						<div class="contact-info-area">

							<div class="additional-info" data-aos="fade-up" data-aos-delay="200">
								<div class="info-stats mb-3 d-flex flex-row flex-nowrap align-items-center">
									<div class="row w-100 align-items-center g-0">

										<div class="col-md-9 col-12">
											<div class="stat-item">
												<h1 class="stat-number fw-bold fs-3 text-start mb-1">끝장! 밸런스 게임</h1>
												<div class="stat-label small text-start text-white">
													이 세상 모든 밸런스 게임을 모아봤어요. 밸런스 게임을 지금 시작해보세요!
												</div>
											</div>
										</div>
										<div class="col-md-1 col-0">
											<div class="mt-3"></div>
										</div>
										<div class="col-md-2 col-12 d-flex justify-content-end">
											<div class="button-group w-100">
												<button onclick="startBalanceGame()"
													class="btn btn-primary w-100 py-2 text-nowrap rounded-5"
													style="background: #524dd3; border: none;">
													테스트 시작
												</button>
											</div>
										</div>

									</div>
								</div>
							</div>

							<div class="row leadership-slider pb-4">
								<div class="col-12">
									<p class="text-start ms-2 text-primary small mb-2"><i
											class="bi bi-info-circle-fill"></i> 매운맛 질문을 제외할 수 있어요.</p>
									<div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
										<!-- 매운맛 질문 필터 -->
										<div>
											<div
												class="form-check form-switch custom-switch d-flex align-items-center bord-radius-20 px-3 py-2 d">
												<label class="form-check-label text-white small mb-0 me-5"
													for="spicyFilter" style="cursor: pointer;">
													🌶️ 매운맛 질문 포함
												</label>
												<input class="form-check-input mt-0" checked type="checkbox"
													role="switch" id="spicyFilter" style="cursor: pointer;">
											</div>
										</div>

									</div>
								</div>
							</div>

							<div class="row leadership-slider pb-4">
								<div class="col-12">
									<p class="text-start ms-2 text-primary small mb-2"><i
											class="bi bi-info-circle-fill"></i> 카테고리를 적용할 수 있어요</p>
									<div class="">
										<!-- 카테고리 선택 -->
										<div>
											<select class="form-select text-white bord-radius-20 d px-3 py-2"
												aria-label="Category select" id="category">
												<option value="all" selected>📦 전체</option>
												<option value="love">💖 연애/결혼</option>
												<option value="food">🍕 음식/맛집</option>
												<option value="work">💼 직장/진로</option>
												<option value="daily">🏠 일상/생활</option>
												<option value="money">💰 경제/자산</option>
												<option value="hobby">🎮 취미/게임</option>
												<option value="school">📚 학교/공부</option>
												<option value="travel">✈️ 여행/휴식</option>
												<option value="fashion">💄 패션/뷰티</option>
												<option value="fantasy">⚡️ 판타지/IF</option>
												<option value="adult">🔞 매운맛/19금</option>
												<option value="etc">🧩 기타/랜덤</option>
											</select>
										</div>

									</div>
								</div>
							</div>


							<div class="contact-methods" data-aos="fade-up">
								<!-- 컨텐츠 보여줄 영역 -->
								<div class="balanceGame-list"></div>
							</div>

						</div>
					</div>
				</div>
			</div>
		</section><!-- /Contact Section -->
	</div>
</body>

</html>
