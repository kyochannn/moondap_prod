<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layout/main_layout}"
      >
<!-- layout:decorate="~{/레이아웃 경로/레이아웃 파일명}" -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
		.expand-btn {
		    width: 40px; 
		    height: 40px;
		    border-radius: 20px !important;
		    overflow: hidden;
		    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		    display: flex;
		    flex-direction: row; /* 정방향: 아이콘 - 텍스트 순서 */
		    align-items: center;
		    justify-content: flex-start; /* 왼쪽 정렬 */
		    border: none;
		    white-space: nowrap;
		}
		
		/* 아이콘 영역: 항상 버튼의 시작점(왼쪽) 근처에 위치 */
		.expand-btn i {
		    width: 40px;
		    min-width: 40px;
		    height: 40px;
		    display: flex;
		    align-items: center;
		    justify-content: center;
		    font-size: 1rem;
		    flex-shrink: 0;
		}
		
		/* 텍스트 영역: 아이콘 바로 오른쪽에 밀착 */
		.btn-text {
		    opacity: 0;
		    max-width: 0;
		    overflow: hidden;
		    transition: all 0.3s ease-out;
		    font-size: 0.85rem;
		    font-weight: 600;
		    margin-left: -5px; /* 아이콘과 더 바짝 붙이기 위해 음수 마진 활용 */
		}
		
		/* 확장 상태: 버튼이 왼쪽으로 늘어남 */
		.expand-btn:hover, .expand-btn:active {
		    width: 150px; /* 늘어나는 너비 */
		}
		
		/* 확장 시 텍스트 스타일 */
		.expand-btn:hover .btn-text, .expand-btn:active .btn-text {
		    opacity: 1;
		    max-width: 110px;
		    margin-left: 0px; /* 확장 시 살짝 간격을 벌림 */
		    padding-right: 15px; /* 오른쪽 끝 여백 */
		}
		
		
		
		/* 드롭존 기본 스타일 */
		.drop-zone.active-upload {
		    position: relative;
		    border: 2px dashed rgba(255, 255, 255, 0.4); /* 기본 점선 */
		    border-radius: 20px;
		    background: #1a1b2e;
		    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		}
		
		/* 이미지 위에 얹어지는 가이드 레이어 */
		.upload-guide-layer {
		    position: absolute;
		    inset: 0;
		    z-index: 2;
		    background: rgba(0, 0, 0, 0.4); /* 이미지 위를 어둡게 눌러줌 */
		    border-radius: 20px;
		    backdrop-filter: blur(2px); /* 약간의 블러로 텍스트 집중도 향상 */
		    opacity: 1;
		    transition: background 0.3s;
		}
		
		/* 이미지가 있을 때 호버하면 더 밝아지게 */
		.drop-zone:hover .upload-guide-layer {
		    background: rgba(82, 79, 208, 0.6); /* 교찬님 포인트 컬러로 변경 */
		}
		
		/* 안내 텍스트 스타일 */
		.guide-text {
		    color: white;
		    font-size: 0.9rem;
		    font-weight: 600;
		    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
		}
		
		.guide-sub-text {
		    color: rgba(255, 255, 255, 0.7);
		    font-size: 0.75rem;
		}
		
		/* 아이콘 주변 원형 강조 */
		.icon-circle {
		    width: 50px;
		    height: 50px;
		    background: rgba(255, 255, 255, 0.2);
		    border-radius: 50%;
		    display: flex;
		    align-items: center;
		    justify-content: center;
		    border: 1px solid rgba(255, 255, 255, 0.3);
		}
		
		/* 드래그 앤 드롭 시 애니메이션 */
		@keyframes dash-move {
		    to { stroke-dashoffset: -20; }
		}
		
		.drop-zone.drag-over {
		    border: 2px dashed #ffffff;
		    transform: scale(0.98);
		    box-shadow: inset 0 0 30px rgba(255,255,255,0.2);
		}
	</style>
	
	<!-- dragAndDrop.js에는 이미지 유효성 검사, 파일 압축, 이미지명 uuid 변경, drag and drop 기능이 포함 -->
	<script th:src="@{/assets/js/dragAndDrop.js}"></script>
	<script>
		document.addEventListener('DOMContentLoaded', function() {
			// 화면이 처음 로드될 때 최상단으로 이동하도록 설정
			if ('scrollRestoration' in history) {
			    history.scrollRestoration = 'manual';
			}
			window.scrollTo(0, 0);
			
			// 텍스트 박스 길이 초과하면 다음 줄로 처리
			$(document).on('input', '#option1Text', function() {
			    this.style.height = 'auto';
			    this.style.height = (this.scrollHeight) + 'px';
			});
			
			$(document).on('input', '#option2Text', function() {
			    this.style.height = 'auto';
			    this.style.height = (this.scrollHeight) + 'px';
			});
		});
		
		// 밸런스 게임 저장
		function gameInsertForm() {
			
		   	let title = $('#title').val().trim();
		   	let spicyFilter = $('#spicyFilter').is(':checked');
		   	let category = $('#category').val().trim();
		   	let option1Text = $('#option1Text').val().trim();
		   	let option2Text = $('#option2Text').val().trim();

		    const file1 = $('#file-input-1')[0].files[0];
		    const file2 = $('#file-input-2')[0].files[0];
		    
		   	if (title === "") {
		        alert("제목을 입력해주세요!");
		        $('#title').focus();
		        return;
		    }
		   	
		   	if (title.length > 30) {
		        alert("제목의 길이가 30자를 초과했어요!");
		        $('#title').focus();
		        return;
		   	}
		    
		    if (category === "") {
		        alert("카테고리를 선택해주세요!");
		        $('#category').focus();
		        return;
		    }

		    if (option1Text === "") {		    	
		        alert("왼쪽 선택지 내용을 입력해주세요!");
		        $('#option1Text').focus();
		        return;
		    }
		    	
		    if (option2Text === "") {
		        alert("오른쪽 선택지 내용을 입력해주세요!");
		        $('#option2Text').focus();
		        return;
		    }
		    
		   	if (option1Text.length > 20) {
		        alert("왼쪽 선택지의 길이가 20자를 초과했어요!");
		        $('#option1Text').focus();
		        return;
		   	}
		   	
		   	if (option2Text.length > 20) {
		        alert("오른쪽 선택지의 길이가 20자를 초과했어요!");
		        $('#option2Text').focus();
		        return;
		   	}
		    
		    if (!file1 || !file2) {
		        alert("사진을 양쪽 다 올려주셔야 해요!");
		        return;
		    }
		   	
			// 로딩 시작
			showLoading();
			
			const formData = new FormData();
			
		    formData.append('title', title);
		    formData.append('spicyFilter', spicyFilter);
		    formData.append('category', category);
		    formData.append('option1Text', option1Text);
		    formData.append('option2Text', option2Text);
			formData.append('option1Image', file1);
		    formData.append('option2Image', file2);
			
		    $.ajax({
		        url: '/balanceGame/insertBalanceGame',
		        type: 'POST',
		        data: formData,
		        processData: false,
		        contentType: false,
		        success: function(response) {
		            hideLoading();
		            if (response.flag === "success") {
			            alert("밸런스 게임 등록이 완료되었어요!");		            	
			            location.replace("/balanceGame/selectBalanceGameView?id=" + response.balanceGameId + '&spicyFilter=' + '1' + '&category=' + 'all');
		            } else {
		            	alert("밸런스 게임 저장 중에 데이터를 불러오면서 문제가 발생했어요.");
		            }
		        },
		        error: function(xhr) {
		            hideLoading();
		        	alert("밸런스 게임 저장 중에 문제가 발생했어요.");
		            console.error(xhr);
		        }
		    });
		}
	</script>
<title>세상의 모든 테스트, 문답</title></head>
